<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSheet Cloud - Official Gimmicks</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05080f;
            --surface: rgba(20, 27, 45, 0.7);
            --primary: #ff3e3e;
            --secondary: #3b82f6;
            --accent: #10b981;
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top right, #111827, #05080f); color: var(--text); padding: 15px; min-height: 100vh; }
        .container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 20px; }

        /* Estilo dos Cards */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .pkmn-card { background: var(--surface); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 22px; padding: 15px; }

        .pkmn-header { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
        
        /* Frame do Pokemon Ampliado */
        .sprite-frame { 
            width: 90px; height: 90px; background: #000; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);
            position: relative; overflow: visible; /* Permitir que o ícone da gimmick possa sobressair levemente se necessário */
        }
        
        .pkmn-img { 
            width: 100%; height: 100%; object-fit: contain; 
            image-rendering: pixelated; 
            transform: scale(1.5); /* Pokémon bem maior */
        }

        /* Ícone da Gimmick Oficial */
        .gimmick-badge {
            position: absolute; 
            bottom: -5px; 
            right: -5px; 
            width: 32px; 
            height: 32px;
            background-size: contain; 
            background-repeat: no-repeat; 
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
            display: none;
        }

        .search-area { flex: 1; }
        input, select, textarea {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            color: white; padding: 8px; border-radius: 10px; font-size: 0.85rem; width: 100%;
        }

        label { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; display: block; }

        .results-box {
            position: absolute; background: #1e293b; border-radius: 8px; 
            z-index: 100; max-height: 150px; overflow-y: auto; display: none; width: 200px;
        }
        .results-box div { padding: 8px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="team" class="team-grid"></div>
</div>

<script>
    // URLs estáveis para os símbolos oficiais (Sprites da PokeSprite/Msikma)
    const gimmickIcons = {
        "Mega": "https://raw.githubusercontent.com/msikma/pokesprite/master/misc/battle-icon/mega.png",
        "Z-Move": "https://raw.githubusercontent.com/msikma/pokesprite/master/misc/battle-icon/z-move.png",
        "G-Max": "https://raw.githubusercontent.com/msikma/pokesprite/master/misc/battle-icon/gigantamax.png",
        "Tera": "https://raw.githubusercontent.com/msikma/pokesprite/master/misc/battle-icon/terastal.png"
    };

    let allPkmn = [];

    async function init() {
        renderSlots();
        const r = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
        const d = await r.json();
        allPkmn = d.results;
    }

    function renderSlots() {
        const team = document.getElementById('team');
        for(let i=1; i<=6; i++) {
            team.innerHTML += `
            <div class="pkmn-card">
                <div class="pkmn-header">
                    <div class="sprite-frame">
                        <img id="img-${i}" class="pkmn-img" style="display:none">
                        <div id="gim-badge-${i}" class="gimmick-badge"></div>
                    </div>
                    <div class="search-area" style="position:relative">
                        <label>Pokémon #${i}</label>
                        <input type="text" id="p${i}-name" oninput="doSearch(${i})" placeholder="Nome do Pokémon...">
                        <div id="drop-${i}" class="results-box"></div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 85px; gap:8px">
                    <select id="p${i}-nature"><option value="">Nature</option></select>
                    <select id="p${i}-gim" onchange="updateGimmick(${i})">
                        <option value="">Gimmick</option>
                        <option value="Mega">Mega</option>
                        <option value="Z-Move">Z-Move</option>
                        <option value="G-Max">G-Max</option>
                        <option value="Tera">Tera</option>
                    </select>
                </div>
            </div>`;
        }
    }

    function updateGimmick(slot) {
        const val = document.getElementById(`p${slot}-gim`).value;
        const badge = document.getElementById(`gim-badge-${slot}`);
        if(val && gimmickIcons[val]) {
            badge.style.backgroundImage = `url('${gimmickIcons[val]}')`;
            badge.style.display = 'block';
        } else {
            badge.style.display = 'none';
        }
    }

    function doSearch(slot) {
        const q = document.getElementById(`p${slot}-name`).value.toLowerCase();
        const drop = document.getElementById(`drop-${slot}`); drop.innerHTML = "";
        if(q.length < 2) return drop.style.display="none";
        const hits = allPkmn.filter(p => p.name.includes(q)).slice(0, 5);
        if(hits.length) {
            drop.style.display="block";
            hits.forEach(p => {
                const d = document.createElement('div');
                d.innerText = p.name.charAt(0).toUpperCase() + p.name.slice(1);
                d.onclick = () => selectPkmn(slot, p.name);
                drop.appendChild(d);
            });
        }
    }

    async function selectPkmn(slot, name) {
        document.getElementById(`p${slot}-name`).value = name.charAt(0).toUpperCase() + name.slice(1);
        document.getElementById(`drop-${slot}`).style.display = "none";
        const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        const d = await r.json();
        const img = document.getElementById(`img-${slot}`);
        img.src = d.sprites.front_default;
        img.style.display = "block";
    }

    init();
</script>
</body>
</html>

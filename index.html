<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSheet Cloud Pro v6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(22, 30, 45, 0.7);
            --primary: #ff4d4d;
            --primary-glow: rgba(255, 77, 77, 0.3);
            --secondary: #4d8cff;
            --accent: #00f2ad;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #0f172a, #05070a);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.5;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: auto; display: flex; flex-direction: column; gap: 30px; }

        /* Auth Bar Moderna */
        .auth-bar {
            background: var(--panel);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.2rem;
            background: linear-gradient(90deg, var(--primary), #ff8080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .auth-inputs { display: flex; gap: 12px; }
        .auth-inputs input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            width: 160px;
            font-size: 0.85rem;
        }

        /* Seções */
        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: -10px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        .section-line { height: 1px; flex: 1; background: var(--border); }

        /* Painéis */
        .panel {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Header do Treinador */
        .header-top { display: flex; gap: 35px; flex-wrap: wrap; }

        .avatar-container { position: relative; }
        .avatar-box {
            width: 160px;
            height: 160px;
            background: var(--input-bg);
            border: 2px dashed var(--border);
            border-radius: 30px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .avatar-box:hover { border-color: var(--secondary); box-shadow: 0 0 20px rgba(77, 140, 255, 0.2); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .grid-header { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }

        .field-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

        input, select, textarea {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.95rem;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(77, 140, 255, 0.1);
            background: rgba(0,0,0,0.5);
        }

        /* Time Pokémon */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
        .pkmn-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pkmn-card:hover { border-color: rgba(255, 255, 255, 0.2); transform: translateY(-5px); }

        .sprite-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1a202c, #000);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .search-container { position: relative; flex: 1; }
        .search-results {
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: #1e293b;
            border-radius: 12px;
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .search-results div { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .search-results div:hover { background: var(--secondary); }

        /* Botões */
        .btn {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-blue { background: linear-gradient(135deg, #4d8cff, #3b71db); color: white; }
        .btn-green { background: linear-gradient(135deg, #00f2ad, #00c48d); color: #05070a; }
        .btn-convert {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            width: 100%;
            font-size: 1rem;
            margin-top: 20px;
            height: 55px;
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Inventário */
        .inv-grid { display: grid; grid-template-columns: 1fr 240px; gap: 20px; }
        .money-card {
            background: linear-gradient(135deg, #064e3b, #022c22);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--accent);
        }
        .money-card input {
            background: transparent;
            border: none;
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            text-align: center;
            width: 100%;
        }

        /* Modal */
        #crop-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .crop-area { width: 90%; max-width: 450px; height: 450px; background: #000; border-radius: 24px; overflow: hidden; }

        #convert-result {
            display: none;
            margin-top: 25px;
            background: rgba(0,0,0,0.4);
            color: var(--accent);
            font-family: 'Courier New', monospace;
            padding: 25px;
            border-radius: 18px;
            border: 1px dashed var(--accent);
            white-space: pre-wrap;
        }

        @media (max-width: 768px) {
            .header-top { justify-content: center; }
            .inv-grid { grid-template-columns: 1fr; }
            .auth-bar { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-bar">
        <div class="logo-text">POKÉSHEET CLOUD PRO</div>
        <div class="auth-inputs">
            <input type="text" id="user-id" placeholder="Treinador">
            <input type="password" id="user-pass" placeholder="Senha">
            <button class="btn btn-green" onclick="cloudAction('save')">SALVAR</button>
            <button class="btn btn-blue" onclick="cloudAction('load')">ENTRAR</button>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">Ficha de Treinador</div>
        <div class="section-line"></div>
    </div>

    <div class="panel header-top">
        <div class="avatar-container">
            <div onclick="document.getElementById('file-input').click()" class="avatar-box">
                <img id="main-avatar" style="display:none">
                <span id="placeholder">ADICIONAR FOTO</span>
            </div>
            <input type="file" id="file-input" hidden accept="image/*">
        </div>
        
        <div class="grid-header">
            <div class="field-group" style="grid-column: span 2;">
                <label>Nome do Treinador</label>
                <input type="text" id="t-name" class="save" placeholder="Ex: Red">
            </div>
            <div class="field-group">
                <label>Sexo</label>
                <select id="t-sex" class="save">
                    <option value="">Escolher...</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>
            <div class="field-group">
                <label>Idade <span style="color:var(--primary)">• Mín. 10</span></label>
                <input type="number" id="t-age" class="save" min="10" placeholder="10">
            </div>
            <div class="field-group">
                <label>Altura</label>
                <input type="text" id="t-height" class="save" placeholder="1,70m">
            </div>
            <div class="field-group">
                <label>Classe</label>
                <select id="t-class" class="save">
                    <option value="Treinador">Treinador</option>
                    <option value="Coordenador">Coordenador</option>
                    <option value="Criador">Criador</option>
                    <option value="Pesquisador">Pesquisador</option>
                    <option value="Ranger">Pokémon Ranger</option>
                    <option value="Rocket">Equipe Rocket</option>
                </select>
            </div>
            <div class="field-group">
                <label>Região de Origem</label>
                <select id="t-region" class="save" onchange="updateCities()"></select>
            </div>
            <div class="field-group">
                <label>Cidade Natal</label>
                <select id="t-city" class="save"></select>
            </div>
            <div class="field-group" style="grid-column: span 3;">
                <label>Aparência (Descrição Visual ou Créditos da Arte)</label>
                <input type="text" id="t-appearance" class="save" placeholder="Descreva traços marcantes ou de onde veio o avatar...">
            </div>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">Equipe Pokémon</div>
        <div class="section-line"></div>
    </div>
    <div id="team" class="team-grid"></div>

    <div class="section-header">
        <div class="section-title">Inventário & Recursos</div>
        <div class="section-line"></div>
    </div>
    <div class="panel inv-grid">
        <div class="field-group">
            <label>Bolsa (Itens e Equipamentos)</label>
            <textarea id="t-bag" class="save" rows="6" placeholder="• 5x Pokéball&#10;• 2x Potion&#10;• Mapa de Kanto..."></textarea>
        </div>
        <div class="money-card">
            <label style="color: #a7f3d0; margin-bottom: 10px;">SALDO ATUAL</label>
            <div style="display:flex; align-items:center;">
                <span style="font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-right: 5px;">₽</span>
                <input type="text" id="t-money" class="save" value="3000">
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="field-group">
            <label>Diário de Viagem</label>
            <textarea id="notes" class="save" rows="3" placeholder="Anotações extras sobre sua jornada..."></textarea>
        </div>
        <button class="btn btn-convert" onclick="convertSheet()">Gerar Ficha para Copiar ✨</button>
        <div id="convert-result"></div>
    </div>
</div>

<div id="crop-modal">
    <div class="crop-area"><img id="image-to-crop"></div>
    <div style="margin-top:30px; display:flex; gap:15px;">
        <button class="btn" style="background:#334155" onclick="document.getElementById('crop-modal').style.display='none'">CANCELAR</button>
        <button class="btn btn-green" onclick="finishCrop()">FINALIZAR CORTE</button>
    </div>
</div>

    function format(str) { return str.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); }

    async function init() {
        const regSelect = document.getElementById('t-region');
        regSelect.innerHTML = '<option value="">Região...</option>';
        Object.keys(worldData).forEach(r => regSelect.innerHTML += `<option value="${r}">${r}</option>`);

        s.innerHTML = '<option value="">Cidade...</option>';
        if(worldData[r]) worldData[r].forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
        if(cur) s.value = cur;

    function doSearch(slot) {
        const q = document.getElementById(`p${slot}-name`).value.toLowerCase();
        const drop = document.getElementById(`drop-${slot}`); drop.innerHTML = "";
        if(q.length < 2) return drop.style.display="none";
        const hits = allPkmn.filter(p => p.name.includes(q)).slice(0, 5);
        if(hits.length) {
            drop.style.display="block";
            hits.forEach(p => {
                const d = document.createElement('div'); d.innerText = format(p.name);

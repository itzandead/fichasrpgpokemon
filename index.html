<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon: Aurélia</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg: #05080f;
            --surface: rgba(20, 27, 45, 0.7);
            --primary: #ff3e3e;
            --secondary: #3b82f6;
            --accent: #10b981;
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --shiny: #ffce4b;
            --money: #fbbf24;
            --male: #60a5fa;
            --female: #f472b6;
        }

        /* CURSOR PERSONALIZADO */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: url('https://cur.cursors-4u.net/games/gam-13/gam1282.cur'), auto !important;
        }
        
        button, a, input, select, textarea, .avatar-box, .shiny-toggle, .gender-btn {
            cursor: url('https://cur.cursors-4u.net/games/gam-13/gam1281.cur'), pointer !important;
        }

        body { background: radial-gradient(circle at top right, #111827, #05080f); color: var(--text); padding: 15px; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 20px; }

        /* NOTIFICAÇÃO */
        #notification-host { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { 
            background: var(--surface); backdrop-filter: blur(15px); border: 1px solid var(--border); 
            color: white; padding: 15px 25px; border-radius: 15px; font-weight: 600; font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px;
            animation: slideIn 0.3s ease-out forwards; border-left: 4px solid var(--secondary);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.success { border-left-color: var(--accent); }
        .toast.error { border-left-color: var(--primary); }

        .auth-bar { background: var(--surface); backdrop-filter: blur(15px); padding: 18px 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.4); flex-wrap: wrap; gap: 15px; }
        
        .logo-container { position: relative; display: inline-block; padding-right: 40px; }
        .logo { 
            font-family: 'Unbounded', cursive; font-weight: 900; font-size: 1.4rem; letter-spacing: -1px; color: #ffcb05;
            text-shadow: 3px 3px 0px #3b4cca, -1px -1px 0px #3b4cca, 1px -1px 0px #3b4cca, -1px 1px 0px #3b4cca, 1px 1px 0px #3b4cca;
            text-transform: uppercase;
        }
        .pikachu-climb {
            position: absolute; right: -5px; top: -15px; width: 50px; height: 50px;
            background: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif') no-repeat center;
            background-size: contain; animation: hang 3s ease-in-out infinite; pointer-events: none;
        }
        @keyframes hang { 0%, 100% { transform: translateY(0) rotate(5deg); } 50% { transform: translateY(5px) rotate(-5deg); } }

        .auth-inputs { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .auth-buttons { display: flex; gap: 8px; }
        .pass-container { position: relative; display: flex; align-items: center; }
        .pass-container input { padding-right: 35px; width: 140px; }
        .toggle-pass { position: absolute; right: 10px; cursor: pointer; opacity: 0.6; font-size: 0.8rem; }

        .tabs-nav { display: flex; gap: 10px; margin-bottom: -10px; }
        .tab-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 12px 25px; border-radius: 15px 15px 0 0; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--secondary); color: white; border-bottom: none; }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; gap: 25px; }

        .section-tag { display: flex; align-items: center; gap: 10px; margin-bottom: -10px; }
        .section-tag h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }
        .line { height: 1px; flex: 1; background: var(--border); }

        .panel { background: var(--surface); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; }
        .trainer-header { display: flex; gap: 25px; flex-direction: column; align-items: center; }
        
        .avatar-box { 
            width: 140px; height: 140px; border-radius: 50%; 
            background: #000; border: 3px solid var(--border); 
            overflow: hidden; display: flex; 
            align-items: center; justify-content: center; position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .avatar-box:hover { border-color: var(--secondary); transform: scale(1.05); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .form-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .full-width { grid-column: span 2; }
        label { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }

        input, select, textarea { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 12px; font-size: 0.85rem; width: 100%; transition: 0.3s; }
        input:focus { border-color: var(--secondary); outline: none; background: rgba(0,0,0,0.4); }

        .bag-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .bag-sprite { 
            width: 50px; height: 45px; 
            background-image: url('https://i.ibb.co/SwH03wrc/Pt-bag.png');
            background-repeat: no-repeat; background-size: 100px 45px; 
            image-rendering: pixelated; transition: background-position 0.2s steps(1);
        }
        .bag-male { background-position: 0px 0px; }
        .bag-female { background-position: -50px 0px; }

        .money-card { 
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(0,0,0,0.3));
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 16px; padding: 12px 18px; display: flex; align-items: center; gap: 15px;
            width: fit-content; min-width: 200px; margin-top: 15px;
        }
        .money-symbol { font-family: 'Unbounded'; font-size: 1.5rem; color: var(--money); text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .money-input-wrapper { flex: 1; }
        .money-input-wrapper input { background: transparent; border: none; padding: 0; font-size: 1.2rem; font-weight: 800; color: var(--money); width: 100%; }

        /* POKEMON CARD STYLES */
        .team-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .pkmn-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 22px; padding: 15px; display: flex; flex-direction: column; gap: 10px; position: relative; }
        .pkmn-header { display: flex; gap: 12px; align-items: center; }
        .sprite-frame { width: 85px; height: 85px; background: #000; border-radius: 18px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .sprite-frame img.pkmn-img { width: 100%; height: 100%; object-fit: contain; transform: scale(1.35); image-rendering: pixelated; position: absolute; top: 0; left: 0; }
        
        .gimmick-badge { position: absolute; bottom: 5px; right: 5px; width: 28px; height: 28px; background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none; z-index: 10; filter: drop-shadow(0 0 2px black); }
        .shiny-toggle { position: absolute; top: 5px; left: 5px; z-index: 15; font-size: 1.2rem; filter: grayscale(1); transition: 0.3s; }
        .shiny-toggle.active { filter: grayscale(0) drop-shadow(0 0 5px var(--shiny)); }

        .gender-selector { display: flex; gap: 5px; margin-top: 5px; }
        .gender-btn { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 5px; font-size: 0.9rem; color: var(--text-dim); transition: 0.3s; }
        .gender-btn.active.male { background: var(--male); color: white; border-color: #93c5fd; }
        .gender-btn.active.female { background: var(--female); color: white; border-color: #f9a8d4; }
        .gender-btn.disabled { opacity: 0.1; pointer-events: none; }

        .stats-container { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .stat-row { display: grid; grid-template-columns: 80px 1fr 1fr 1fr; gap: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .stat-label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); }
        .stat-val { font-weight: 700; color: var(--accent); text-align: center; }
        .points-badge { background: var(--secondary); padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; margin-bottom: 10px; display: inline-block; }

        .search-area { position: relative; flex: 1; }
        .results-box { position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border-radius: 10px; z-index: 100; max-height: 150px; overflow-y: auto; display: none; border: 1px solid var(--secondary); }
        .results-box div { padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
        .results-box div:hover { background: rgba(255,255,255,0.1); }
        .results-box img { width: 24px; height: 24px; object-fit: contain; }

        .btn { padding: 10px 15px; border-radius: 10px; border: none; font-weight: 700; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-green { background: var(--accent); color: #05080f; }
        .btn-blue { background: var(--secondary); color: white; }
        
        .actions-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .btn-convert { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; width: 100%; padding: 15px; font-size: 0.9rem; }
        .btn-pkmn-ficha { background: var(--secondary); color: white; margin-top: 10px; font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.2); }
        
        .result-box { display: none; margin-top: 15px; background: #000; color: var(--accent); padding: 15px; border-radius: 12px; border: 1px dashed var(--accent); font-family: monospace; white-space: pre-wrap; font-size: 0.8rem; overflow-x: auto; position: relative; }
        .btn-copy-float { background: #334155; color: white; width: 100%; padding: 12px; font-size: 0.8rem; margin-top: 10px; border-radius: 10px; border: none; display: none; cursor: pointer; }

        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .crop-wrap { width: 90vw; height: 90vw; max-width: 400px; max-height: 400px; background: #111; border-radius: 10px; overflow: hidden; }

        @media (min-width: 768px) {
            .trainer-header { flex-direction: row; align-items: center; }
            .form-grid { grid-template-columns: repeat(4, 1fr); }
            .team-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (min-width: 1024px) { .team-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div id="notification-host"></div>

<div class="container">
    <div class="auth-bar">
        <div class="logo-container">
            <div class="logo">Pokémon: Aurélia</div>
            <div class="pikachu-climb"></div>
        </div>
        <div class="auth-inputs">
            <input type="text" id="user-id" placeholder="ID">
            <div class="pass-container">
                <input type="password" id="user-pass" placeholder="Senha">
                <span class="toggle-pass" onclick="togglePassword()">👁️</span>
            </div>
            <div class="auth-buttons">
                <button class="btn btn-green" onclick="cloudAction('save')">Salvar</button>
                <button class="btn btn-blue" onclick="cloudAction('load')">Carregar</button>
            </div>
        </div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="openTab('tab-trainer', this)">TREINADOR</button>
        <button class="tab-btn" onclick="openTab('tab-pokemon', this)">TIME POKÉMON</button>
    </div>

    <div id="tab-trainer" class="tab-content active">
        <div class="section-tag"><h2>Identificação</h2><div class="line"></div></div>
        <div class="panel trainer-header">
            <div class="avatar-wrapper">
                <div onclick="document.getElementById('file-input').click()" class="avatar-box">
                    <img id="main-avatar" style="display:none">
                    <span id="placeholder" style="font-size:0.6rem; color:var(--text-dim); text-align:center; padding: 10px;">ADICIONAR FOTO</span>
                </div>
                <input type="file" id="file-input" hidden accept="image/*">
            </div>
            <div class="form-grid">
                <div class="input-group full-width"><label>Nome</label><input type="text" id="t-name" class="save"></div>
                <div class="input-group"><label>Sexo</label><select id="t-sex" class="save" onchange="updateBagIcon()"><option value="">-</option><option value="Masculino">Masculino</option><option value="Feminino">Feminino</option><option value="Outro">Outro</option></select></div>
                <div class="input-group"><label>Idade</label><input type="number" id="t-age" class="save" min="10"></div>
                <div class="input-group"><label>Altura</label><input type="text" id="t-height" class="save" placeholder="Ex: 1.75"></div>
                <div class="input-group"><label>Classe</label><select id="t-class" class="save"><option value="Treinador">Treinador</option><option value="Coordenador">Coordenador</option><option value="Criador">Criador</option><option value="Pesquisador">Pesquisador</option><option value="Ranger">Ranger</option><option value="Rocket">Equipe Rocket</option></select></div>
                <div class="input-group"><label>Região</label><select id="t-region" class="save" onchange="updateCities()"></select></div>
                <div class="input-group"><label>Cidade</label><select id="t-city" class="save"></select></div>
                <div class="input-group full-width"><label>Aparência</label><input type="text" id="t-appearance" class="save"></div>
            </div>
        </div>

        <div class="section-tag"><h2>Inventário</h2><div class="line"></div></div>
        <div class="panel">
            <div class="bag-header">
                <div id="bag-icon-display" class="bag-sprite bag-male"></div>
                <label>Mochila</label>
            </div>
            <textarea id="t-bag" class="save" rows="4" placeholder="Ex: 1 Pokeball, 1 Poção"></textarea>
            <div class="money-card">
                <div class="money-symbol">₽</div>
                <div class="money-input-wrapper">
                    <label>Saldo Atual</label>
                    <input type="number" id="t-money" class="save" value="0">
                </div>
            </div>
        </div>
        
        <div class="actions-group">
            <button class="btn btn-convert" onclick="convertSheet()">✨ GERAR FICHA EM TEXTO</button>
            <div id="convert-result-trainer" class="result-box"></div>
            <button id="copy-btn-trainer" class="btn-copy-float" onclick="copyToClipboard('convert-result-trainer')">📋 COPIAR PARA O CLIPBOARD</button>
        </div>
    </div>

    <div id="tab-pokemon" class="tab-content">
        <div class="section-tag"><h2>Gestão de Equipe</h2><div class="line"></div></div>
        <div id="team" class="team-grid"></div>
        <div class="actions-group">
            <div id="convert-result-pokemon" class="result-box"></div>
            <button id="copy-btn-pokemon" class="btn-copy-float" onclick="copyToClipboard('convert-result-pokemon')">📋 COPIAR FICHA DO POKÉMON</button>
        </div>
    </div>
</div>

<div id="crop-modal">
    <h3 style="color:white; margin-bottom: 15px; font-family: 'Unbounded'">AJUSTAR AVATAR</h3>
    <div class="crop-wrap"><img id="image-to-crop"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="btn" style="background:#444; color:white;" onclick="document.getElementById('crop-modal').style.display='none'">CANCELAR</button>
        <button class="btn btn-green" onclick="finishCrop()">FINALIZAR</button>
    </div>
</div>

    function showNotify(msg, type = 'info') {

        }, 50); 
    }

    async function init() {
        const regSelect = document.getElementById('t-region');
        regSelect.innerHTML = '<option value="">Região...</option>';
        Object.keys(worldData).forEach(r => regSelect.innerHTML += `<option value="${r}">${r}</option>`);
        renderSlots();
        updateBagIcon();
        try {
            const [pr, ir] = await Promise.all([
                fetch('https://pokeapi.co/api/v2/pokemon?limit=10000'),
                fetch('https://pokeapi.co/api/v2/item?limit=2000')
            ]);
            allPkmn = (await pr.json()).results;
            allItems = (await ir.json()).results;
        } catch(e) {}
    }

    function renderSlots() {
        const team = document.getElementById('team'); team.innerHTML = "";
        for(let i=1; i<=6; i++) {
            team.innerHTML += `
            <div class="pkmn-card">
                <span id="p${i}-shiny-btn" class="shiny-toggle" onclick="toggleShiny(${i})">✨</span>
                <input type="hidden" id="p${i}-is-shiny" value="false" class="save">
                <input type="hidden" id="p${i}-gender" value="Indefinido" class="save">
                <div class="pkmn-header">
                    <div class="sprite-frame"><img id="img-${i}" class="pkmn-img" style="display:none"><div id="gim-badge-${i}" class="gimmick-badge"></div></div>
                    <div class="search-area">
                        <label>Pokémon #${i}</label>
                        <input type="text" id="p${i}-name" class="save" oninput="doSearch(${i})" placeholder="Espécie...">
                        <div id="drop-${i}" class="results-box"></div>
                        <div class="gender-selector">
                            <button id="p${i}-btn-m" class="gender-btn male" onclick="setGender(${i}, 'Macho')">♂</button>
                            <button id="p${i}-btn-f" class="gender-btn female" onclick="setGender(${i}, 'Fêmea')">♀</button>
                        </div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <div class="input-group"><label>Apelido</label><input type="text" id="p${i}-nick" class="save" placeholder="Apelido..."></div>
                    <div class="input-group"><label>Habilidade</label><select id="p${i}-ability" class="save"><option value="">Habilidade</option></select></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <div class="search-area"><label>Item</label><input type="text" id="p${i}-item" class="save" oninput="doItemSearch(${i})" placeholder="Item..."><div id="drop-item-${i}" class="results-box"></div></div>
                    <div class="input-group"><label>Pokébola</label><input type="text" id="p${i}-ball" class="save" value="Padrão"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px">
                    <div class="input-group"><label>Amizade</label><input type="number" id="p${i}-friend" class="save" value="0" min="0" max="255"></div>
                    <div class="input-group"><label>Level</label><input type="number" id="p${i}-lvl" class="save" value="1" min="1" max="100" onchange="calcStats(${i}); updateMoves(${i});"></div>
                    <div class="input-group"><label>XP Atual</label><input type="text" id="p${i}-xp" class="save" placeholder=""></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <div class="input-group"><label>Nature</label><select id="p${i}-nature" class="save" onchange="calcStats(${i})"><option value="">Nature</option>${Object.keys(natures).map(n=>`<option value="${n}">${n}</option>`).join('')}</select></div>
                    <div class="input-group"><label>Gimmick</label><select id="p${i}-gim" class="save" onchange="updateGimmickIcon(${i})"><option value="">Nenhuma</option><option value="Mega">Mega</option><option value="Z-Move">Z-Move</option><option value="Dynamax">Dynamax</option><option value="Tera">Tera</option></select></div>
                </div>
                <div class="stats-container">
                    <div class="points-badge">Pontos Disponíveis: <span id="p${i}-pts">0</span></div>
                    ${['hp', 'atk', 'def', 'spa', 'spd', 'spe'].map(s => `<div class="stat-row"><span class="stat-label">${s.toUpperCase()}</span><input type="number" id="p${i}-base-${s}" class="save" placeholder="Base" onchange="calcStats(${i})"><input type="number" id="p${i}-up-${s}" class="save" placeholder="Add" onchange="calcStats(${i})"><span id="p${i}-total-${s}" class="stat-val">0</span></div>`).join('')}
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px">
                    <select id="p${i}-m1" class="save"></select><select id="p${i}-m2" class="save"></select>
                    <select id="p${i}-m3" class="save"></select><select id="p${i}-m4" class="save"></select>
                </div>
                <button class="btn btn-pkmn-ficha" onclick="convertPkmnFicha(${i})">GERAR FICHA DE POKÉMON</button>
            </div>`;
        }
    }

    function setGender(slot, gender) {
        document.getElementById(`p${slot}-gender`).value = gender;
        document.getElementById(`p${slot}-btn-m`).classList.toggle('active', gender === 'Macho');
        document.getElementById(`p${slot}-btn-f`).classList.toggle('active', gender === 'Fêmea');
    }

    function toggleShiny(slot) {
        const hiddenInput = document.getElementById(`p${slot}-is-shiny`);
        const btn = document.getElementById(`p${slot}-shiny-btn`);
        const isShiny = hiddenInput.value === 'true';
        hiddenInput.value = !isShiny;
        btn.classList.toggle('active', !isShiny);
        if (pkmnFullData[slot]) updatePkmnImage(slot, pkmnFullData[slot], !isShiny);
    }

    function updatePkmnImage(slot, data, isShiny) {
        const img = document.getElementById(`img-${slot}`);
        const artwork = data.sprites.other['official-artwork'];
        img.src = isShiny ? (artwork.front_shiny || data.sprites.front_shiny) : (artwork.front_default || data.sprites.front_default);
        img.style.display = "block";
    }

    function calcStats(slot) {
        const lvl = parseInt(document.getElementById(`p${slot}-lvl`).value) || 1;
        const nature = natures[document.getElementById(`p${slot}-nature`).value] || {plus: null, minus: null};
        let used = 0;
        ['hp', 'atk', 'def', 'spa', 'spd', 'spe'].forEach(s => {
            const base = parseInt(document.getElementById(`p${slot}-base-${s}`).value) || 0;
            const up = parseInt(document.getElementById(`p${slot}-up-${s}`).value) || 0;
            used += up;
            let mult = 1.0;
            if(nature.plus === s) mult += 0.1; if(nature.minus === s) mult -= 0.1;
            mult += (Math.floor(up / 10) * 0.01);
            const total = Math.floor((base + up) * mult);
            const d = document.getElementById(`p${slot}-total-${s}`);
            d.innerText = total; d.style.color = mult > 1 ? '#10b981' : (mult < 1 ? '#ff3e3e' : '#f1f5f9');
        });
        const pts = document.getElementById(`p${slot}-pts`);
        pts.innerText = ((lvl - 1) * 5) - used;
        pts.style.color = (parseInt(pts.innerText) < 0) ? '#ff3e3e' : '#10b981';
    }

    function updateGimmickIcon(slot) {
        const val = document.getElementById(`p${slot}-gim`).value;
        const b = document.getElementById(`gim-badge-${slot}`);
        if(val && gimmicks[val]) { b.style.backgroundImage = `url('${gimmicks[val]}')`; b.style.display = 'block'; } else b.style.display = 'none';
    }

    function updateCities() {
        const r = document.getElementById('t-region').value;
        const s = document.getElementById('t-city');
        const cur = s.value; s.innerHTML = '<option value="">Cidade...</option>';
        if(worldData[r]) worldData[r].forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
        if(cur) s.value = cur;
    }

    function doSearch(slot) {
        const q = document.getElementById(`p${slot}-name`).value.toLowerCase().replace(/ /g, '-');
        const drop = document.getElementById(`drop-${slot}`); drop.innerHTML = "";
        if(q.length < 2) return drop.style.display="none";
        const hits = allPkmn.filter(p => p.name.includes(q)).slice(0, 10);
        if(hits.length) {
            drop.style.display="block";
            hits.forEach(p => {
                const id = p.url.split('/')[6];
                const d = document.createElement('div');
                d.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png"> <span>${format(p.name)}</span>`;
                d.onclick = () => selectPkmn(slot, p.name);
                drop.appendChild(d);
            });
        }
    }

    async function selectPkmn(slot, name, restoreData = null) {
        document.getElementById(`p${slot}-name`).value = format(name);
        document.getElementById(`drop-${slot}`).style.display = "none";
        try {
            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
            const d = await r.json();
            pkmnFullData[slot] = d;
            const specRes = await fetch(d.species.url);
            const specData = await specRes.json();
            const gRate = specData.gender_rate;
            const btnM = document.getElementById(`p${slot}-btn-m`);
            const btnF = document.getElementById(`p${slot}-btn-f`);
            btnM.classList.remove('disabled'); btnF.classList.remove('disabled');
            if(gRate === -1) { btnM.classList.add('disabled'); btnF.classList.add('disabled'); setGender(slot, 'Indefinido'); }
            else if(gRate === 8) { btnM.classList.add('disabled'); setGender(slot, 'Fêmea'); }
            else if(gRate === 0) { btnF.classList.add('disabled'); setGender(slot, 'Macho'); }
            else { if(!restoreData) setGender(slot, 'Macho'); }
            updatePkmnImage(slot, d, document.getElementById(`p${slot}-is-shiny`).value === 'true');
            const ab = document.getElementById(`p${slot}-ability`);
            ab.innerHTML = '<option value="">Habilidade</option>';
            d.abilities.forEach(a => ab.innerHTML += `<option value="${format(a.ability.name)}">${format(a.ability.name)}</option>`);
            if (restoreData) { ab.value = restoreData[`p${slot}-ability`]; setGender(slot, restoreData[`p${slot}-gender`]); }
            if(!restoreData) { d.stats.forEach((s, idx) => { const map = ['hp', 'atk', 'def', 'spa', 'spd', 'spe']; document.getElementById(`p${slot}-base-${map[idx]}`).value = s.base_stat; }); calcStats(slot); }
            moveCache[slot] = d.moves; updateMoves(slot, restoreData);
        } catch(e) {}
    }

    function doItemSearch(slot) {
        const q = document.getElementById(`p${slot}-item`).value.toLowerCase().replace(/ /g, '-');
        const drop = document.getElementById(`drop-item-${slot}`); drop.innerHTML = "";
        if(q.length < 2) return drop.style.display="none";
        const hits = allItems.filter(i => i.name.includes(q)).slice(0, 10);
        if(hits.length) {
            drop.style.display="block";
            hits.forEach(item => {
                const d = document.createElement('div');
                d.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${item.name}.png" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png'"> <span>${format(item.name)}</span>`;
                d.onclick = () => { document.getElementById(`p${slot}-item`).value = format(item.name); drop.style.display = "none"; };
                drop.appendChild(d);
            });
        }
    }

    function updateMoves(slot, restoreData = null) {
        const moves = moveCache[slot]; if(!moves) return;
        const lvl = parseInt(document.getElementById(`p${slot}-lvl`).value) || 1;
        const avail = moves.filter(m => m.version_group_details.some(vd => vd.move_learn_method.name === 'level-up' && vd.level_learned_at <= lvl)).map(m => m.move.name);
        const unique = [...new Set(avail)].map(format).sort();
        for(let i=1; i<=4; i++) {
            const s = document.getElementById(`p${slot}-m${i}`);
            const cur = s.value; s.innerHTML = '<option value="">Golpe</option>';
            unique.forEach(m => s.innerHTML += `<option value="${m}">${m}</option>`);
            if(restoreData) s.value = restoreData[`p${slot}-m${i}`]; else s.value = cur;
        }
    }

    function convertSheet() {
        const d = (id) => document.getElementById(id).value || "---";
        const rawBag = document.getElementById('t-bag').value;
        const bagItems = rawBag.split(/[\n,]+/).map(item => item.trim()).filter(item => item !== "");
        let bagText = ""; bagItems.forEach(item => { bagText += `╰┈➤ - ${item}\n`; });
        let pkmnText = "";
        for(let i=1; i<=6; i++) {
            const pName = document.getElementById(`p${i}-name`).value;
            const pNick = document.getElementById(`p${i}-nick`).value;
            const pLvl = document.getElementById(`p${i}-lvl`).value;
            if(pName) pkmnText += `╰┈➤ ${pNick || pName} (Lv. ${pLvl})${document.getElementById(`p${i}-is-shiny`).value === 'true' ? ' ✨' : ''}\n`;
            else pkmnText += `╰┈➤ Vazio\n`;
        }
        const template = `‎‧₊˚✧Ficha do Treinador✧˚₊‧‎\n` +
            `- Nome: ${d('t-name')}\n` +
            `- Sexo: ${d('t-sex')}\n` +
            `- Idade: ${d('t-age')}\n` +
            `- Altura: ${d('t-height')}\n` +
            `- Dinheiro: ₽ ${d('t-money')}\n\n` +
            `━━━━❰BOLSA❱━━━━\n` +
            `${bagText}` +
            `━━━━▣━━◤POKÉMONS◢━━▣━━━━━\n` +
            `${pkmnText}`;
        const res = document.getElementById('convert-result-trainer');
        res.innerText = template; res.style.display = 'block';
        document.getElementById('copy-btn-trainer').style.display = 'block';
        fastScroll();
    }

    function convertPkmnFicha(slot) {
        const d = (id) => document.getElementById(id).value || "---";
        const pkmnName = d(`p${slot}-name`);
        const pNick = d(`p${slot}-nick`);
        if(pkmnName === "---") return showNotify("Escolha um Pokémon primeiro!", "error");
        const displayID = (pNick !== "---" && pNick !== "") ? `${pNick} (${pkmnName})` : pkmnName;
        const isShiny = document.getElementById(`p${slot}-is-shiny`).value === 'true' ? ' ✨' : '';
        const moves = [d(`p${slot}-m1`), d(`p${slot}-m2`), d(`p${slot}-m3`), d(`p${slot}-m4`)].filter(m => m !== "Golpe");
        const statLabelMap = {hp: 'HP', atk: 'Ataque', def: 'Defesa', spa: 'Sp.Ataque', spd: 'Sp.Defesa', spe: 'Velocidade'};
        const nature = natures[d(`p${slot}-nature`)] || {plus: null, minus: null};
        let statsText = "";
        ['hp', 'atk', 'def', 'spa', 'spd', 'spe'].forEach(s => {
            const base = parseInt(d(`p${slot}-base-${s}`)) || 0;
            const add = parseInt(d(`p${slot}-up-${s}`)) || 0;
            const total = document.getElementById(`p${slot}-total-${s}`).innerText;
            let percTotal = 0;
            if(nature.plus === s) percTotal += 10;
            if(nature.minus === s) percTotal -= 10;
            percTotal += Math.floor(add / 10);
            const percSign = percTotal >= 0 ? "+" : "";
            statsText += `→ ${statLabelMap[s]}: ${base} (${percSign}${percTotal}%) = ${total}\n`;
        });
        const template = `°Ficha do Pokémon°\n\n` +
            `- Nome: ${displayID}${isShiny}\n` +
            `- Sexo: ${d(`p${slot}-gender`)}\n` +
            `- Natureza: ${d(`p${slot}-nature`)}\n` +
            `- Amizade: ${d(`p${slot}-friend`)}\n` +
            `- Level: ${d(`p${slot}-lvl`)}\n` +
            `- XP: ${d(`p${slot}-xp`)}\n\n` +
            `------Status Puro------\n` +
            `${statsText}\n` +
            `------Habilidade------\n` +
            `→ ${d(`p${slot}-ability`)}\n\n` +
            `------Item equipado------\n` +
            `→ ${d(`p${slot}-item`)}\n\n` +
            `------Pokeball Usada------\n` +
            `→ ${d(`p${slot}-ball`)}\n\n` +
            `------Lista de Movimentos------\n` +
            `${moves.map(m => `→ ${m}`).join('\n')}`;
        const res = document.getElementById('convert-result-pokemon');
        res.innerText = template; res.style.display = 'block';
        document.getElementById('copy-btn-pokemon').style.display = 'block';
        fastScroll();
    }

    function copyToClipboard(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            showNotify("Copiado com sucesso!", "success");
        }).catch(() => showNotify("Erro ao copiar.", "error"));
    }

    async function cloudAction(type) {
        const user = document.getElementById('user-id').value;
        const pass = document.getElementById('user-pass').value;
        if(!user || !pass) return showNotify("Preencha login e senha!", "error");
        if(type === 'save') {
            const sheet = {}; document.querySelectorAll('.save').forEach(el => sheet[el.id] = el.value);
            const { error } = await _supabase.from('fichas').upsert({ username: user, password: pass, data: sheet, avatar: document.getElementById('main-avatar').src }, { onConflict: 'username' });
            if(error) showNotify("Erro ao salvar.", "error"); else showNotify("Ficha salva com sucesso!", "success");
        } else {
            const { data } = await _supabase.from('fichas').select('*').eq('username', user).single();
            if(data && data.password === pass) {
                Object.keys(data.data).forEach(id => { const el = document.getElementById(id); if(el) el.value = data.data[id]; });
                if(data.avatar) { const img = document.getElementById('main-avatar'); img.src = data.avatar; img.style.display='block'; document.getElementById('placeholder').style.display='none'; }
                updateCities(); 
                document.getElementById('t-city').value = data.data['t-city'];
                updateBagIcon(); 
                for(let i=1; i<=6; i++) { 
                    if(data.data[`p${i}-name`]) await selectPkmn(i, data.data[`p${i}-name`].toLowerCase().replace(/ /g, '-'), data.data);
                    document.getElementById(`p${i}-shiny-btn`).classList.toggle('active', data.data[`p${i}-is-shiny`] === 'true');
                    updateGimmickIcon(i); calcStats(i);
                }
                showNotify(`Dados carregados!`, "success");
            } else showNotify("Acesso negado.", "error");
        }
    }

    document.getElementById('file-input').onchange = (e) => {
        if(!e.target.files.length) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = document.getElementById('image-to-crop'); img.src = event.target.result;
            document.getElementById('crop-modal').style.display = 'flex';
            if(cropper) cropper.destroy();
            cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1, dragMode: 'move', autoCropArea: 0.8, cropBoxMovable: false, cropBoxResizable: false });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function finishCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
        const img = document.getElementById('main-avatar');
        img.src = canvas.toDataURL(); img.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('crop-modal').style.display = 'none';
        showNotify("Avatar atualizado!", "success");
    }

    init();
</script>
</body>
</html>

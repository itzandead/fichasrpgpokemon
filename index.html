<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokﺣ۸Sheet Cloud v5.6 - Organizador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg: #0b0f1a; --card: #161e2d; --primary: #ff4747; 
            --secondary: #4785ff; --text: #f1f5f9; --muted: #64748b;
            --border: #2d3748; --input: #0b0f1a; --accent: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 10px; padding-bottom: 50px; }
        .container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 25px; }
        
        /* Cabeﺣ۶alhos de Seﺣ۶ﺣ۲o */
        .section-title { font-size: 1.4rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--border); padding-bottom: 8px; margin-top: 10px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: 'ﻗ'; color: var(--secondary); }

        .auth-bar { background: linear-gradient(90deg, #1a202c, #2d3748); padding: 15px 20px; border-radius: 12px; display: flex; gap: 12px; align-items: center; border: 1px solid var(--border); justify-content: space-between; flex-wrap: wrap; }
        .auth-inputs { display: flex; gap: 8px; align-items: center; }
        .auth-bar input { background: #000; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; width: 140px; }

        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: 0 15px 25px rgba(0,0,0,0.4); }
        .header-top { border-left: 6px solid var(--primary); display: flex; gap: 25px; flex-wrap: wrap; align-items: flex-start; }
        
        .avatar-box { width: 140px; height: 140px; background: var(--input); border: 2px dashed var(--muted); border-radius: 50%; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .grid-header { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        label { font-size: 0.62rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        input, select, textarea { background: var(--input); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; width: 100%; outline: none; font-size: 0.9rem; }
        input:focus { border-color: var(--secondary); }
        
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 18px; }
        .pkmn-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .sprite-box { width: 70px; height: 70px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .sprite-box img { width: 65px; height: 65px; }

        .search-container { position: relative; flex: 1; }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: #1a202c; border: 1px solid var(--secondary); border-radius: 8px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
        .search-results div { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); }

        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-green { background: var(--accent); color: white; }
        .btn-convert { background: #8b5cf6; color: white; width: 100%; font-size: 1rem; margin-top: 10px; }

        /* Estilo Inventﺣ۰rio */
        .inv-grid { display: grid; grid-template-columns: 1fr 200px; gap: 15px; }
        .money-display { background: #064e3b; border: 2px solid var(--accent); color: #fff; padding: 20px; border-radius: 12px; text-align: center; }
        .money-display input { background: transparent; border: none; font-size: 1.5rem; text-align: center; font-weight: bold; color: var(--accent); }

        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .crop-container { width: 100%; max-width: 400px; height: 400px; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        
        #convert-result { display: none; margin-top: 20px; background: #000; color: #10b981; font-family: monospace; padding: 15px; border-radius: 8px; border: 1px solid var(--accent); white-space: pre-wrap; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-bar">
        <div style="font-weight: 800; color: var(--primary);">POKﺣSHEET CLOUD</div>
        <div class="auth-inputs">
            <input type="text" id="user-id" placeholder="Usuﺣ۰rio">
            <input type="password" id="user-pass" placeholder="Senha">
            <button class="btn btn-green" onclick="cloudAction('save')">Salvar</button>
            <button class="btn btn-blue" onclick="cloudAction('load')">Entrar</button>
        </div>
    </div>

    <div class="section-title">Ficha de Treinador</div>
    <div class="panel header-top">
        <div onclick="document.getElementById('file-input').click()" class="avatar-box">
            <img id="main-avatar" style="display:none">
            <span id="placeholder">FOTO</span>
        </div>
        <input type="file" id="file-input" hidden accept="image/*">
        
        <div class="grid-header">
            <div style="grid-column: span 2;"><label>Nome do Treinador</label><input type="text" id="t-name" class="save"></div>
            <div>
                <label>Sexo</label>
                <select id="t-sex" class="save">
                    <option value="">Selecione...</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>
            <div><label>Idade <span style="color:var(--primary)">(Mﺣ­n. 10)</span></label><input type="number" id="t-age" class="save" min="10"></div>
            <div><label>Altura</label><input type="text" id="t-height" class="save" placeholder="Ex: 1,70m"></div>
            <div>
                <label>Classe</label>
                <select id="t-class" class="save">
                    <option value="Treinador">Treinador</option>
                    <option value="Coordenador">Coordenador</option>
                    <option value="Criador">Criador</option>
                    <option value="Pesquisador">Pesquisador</option>
                    <option value="Ranger">Pokﺣ۸mon Ranger</option>
                </select>
            </div>
            <div><label>Regiﺣ۲o</label><select id="t-region" class="save" onchange="updateCities()"></select></div>
            <div><label>Cidade</label><select id="t-city" class="save"></select></div>
            <div style="grid-column: span 3;"><label>Aparﺣ۹ncia (Descriﺣ۶ﺣ۲o/Fonte do Avatar)</label><input type="text" id="t-appearance" class="save" placeholder="Ex: Artista no Pinterest / Cabelos pretos e jaqueta azul"></div>
        </div>
    </div>

    <div class="section-title">Pokﺣ۸mon</div>
    <div id="team" class="team-grid"></div>

    <div class="section-title">Inventﺣ۰rio</div>
    <div class="panel inv-grid">
        <div>
            <label>Bolsa (Itens)</label>
            <textarea id="t-bag" class="save" rows="5" placeholder="Liste seus itens aqui (um por linha)..."></textarea>
        </div>
        <div class="money-display">
            <label style="color: #a7f3d0;">DINHEIRO (ﻗﺛ)</label>
            <input type="text" id="t-money" class="save" value="0">
        </div>
    </div>

    <div class="panel">
        <label>Notas da Jornada</label>
        <textarea id="notes" class="save" rows="3"></textarea>
        <button class="btn btn-convert" onclick="convertSheet()">ﻗ۷ CONVERTER PARA FICHA TEXTUAL</button>
        <div id="convert-result"></div>
    </div>
</div>

<div id="crop-modal">
    <div class="crop-container"><img id="image-to-crop"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="btn" style="background:#555" onclick="document.getElementById('crop-modal').style.display='none'">CANCELAR</button>
        <button class="btn btn-green" onclick="finishCrop()">CONFIRMAR</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    const SUPABASE_URL = 'https://pjggfdjixenopkiiugmj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqZ2dmZGppeGVub3BraWl1Z21qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjIwMDcsImV4cCI6MjA5MTY5ODAwN30.QWr9d3qT2216to7VOEmc_hzu-g789FTLdYdDUtUosk0';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allPkmn = [];
    let moveCache = {};
    let cropper;

    const natures = ['Adamant', 'Bashful', 'Bold', 'Brave', 'Calm', 'Careful', 'Docile', 'Gentle', 'Hardy', 'Hasty', 'Impish', 'Jolly', 'Lonely', 'Mild', 'Modest', 'Naive', 'Naughty', 'Quiet', 'Quirky', 'Rash', 'Relaxed', 'Sassy', 'Serious', 'Timid'];
    const worldData = { "Kanto": ["Pallet Town", "Viridian City", "Pewter City"], "Johto": ["New Bark Town", "Violet City"], "Hoenn": ["Littleroot Town", "Rustboro City"], "Sinnoh": ["Twinleaf Town", "Jubilife City"], "Unova": ["Nuvema Town", "Castelia City"], "Kalos": ["Vaniville Town", "Lumiose City"], "Alola": ["Hau'oli City"], "Galar": ["Postwick"], "Paldea": ["Cabo Poco"] };

    function format(str) { return str.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); }

    async function init() {
        const regSelect = document.getElementById('t-region');
        regSelect.innerHTML = '<option value="">Regiﺣ۲o...</option>';
        Object.keys(worldData).forEach(r => regSelect.innerHTML += `<option value="${r}">${r}</option>`);
        renderSlots();
        const r = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
        const d = await r.json();
        allPkmn = d.results;
    }

    function renderSlots() {
        const team = document.getElementById('team'); team.innerHTML = "";
        for(let i=1; i<=6; i++) {
            team.innerHTML += `
            <div class="pkmn-card">
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="sprite-box"><img id="img-${i}" style="display:none"></div>
                    <div class="search-container">
                        <label>Pokﺣ۸mon #${i}</label>
                        <input type="text" id="p${i}-name" class="save" oninput="doSearch(${i})" placeholder="Espﺣ۸cie...">
                        <div id="drop-${i}" class="search-results"></div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 65px; gap:5px">
                    <select id="p${i}-nature" class="save"><option value="">Nature</option>${natures.map(n=>`<option value="${n}">${n}</option>`).join('')}</select>
                    <input type="number" id="p${i}-lvl" class="save" value="1" min="1" onchange="updateMoves(${i})">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px">
                    <select id="p${i}-m1" class="save"></select><select id="p${i}-m2" class="save"></select>
                    <select id="p${i}-m3" class="save"></select><select id="p${i}-m4" class="save"></select>
                </div>
            </div>`;
        }
    }

    function doSearch(slot) {
        const q = document.getElementById(`p${slot}-name`).value.toLowerCase();
        const drop = document.getElementById(`drop-${slot}`); drop.innerHTML = "";
        if(q.length < 2) return drop.style.display="none";
        const hits = allPkmn.filter(p => p.name.includes(q)).slice(0, 5);
        if(hits.length) {
            drop.style.display="block";
            hits.forEach(p => {
                const d = document.createElement('div'); d.innerText = format(p.name);
                d.onclick = () => selectPkmn(slot, p.name);
                drop.appendChild(d);
            });
        }
    }

    async function selectPkmn(slot, name, restoreData = null) {
        document.getElementById(`p${slot}-name`).value = format(name);
        document.getElementById(`drop-${slot}`).style.display = "none";
        try {
            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
            const d = await r.json();
            document.getElementById(`img-${slot}`).src = d.sprites.front_default;
            document.getElementById(`img-${slot}`).style.display = "block";
            moveCache[slot] = d.moves;
            updateMoves(slot, restoreData);
        } catch(e) {}
    }

    function updateMoves(slot, restoreData = null) {
        const moves = moveCache[slot]; if(!moves) return;
        const lvl = parseInt(document.getElementById(`p${slot}-lvl`).value) || 1;
        const avail = moves.filter(m => m.version_group_details.some(vd => vd.move_learn_method.name === 'level-up' && vd.level_learned_at <= lvl)).map(m => m.move.name);
        const unique = [...new Set(avail)].map(format).sort();
        for(let i=1; i<=4; i++) {
            const s = document.getElementById(`p${slot}-m${i}`);
            const cur = s.value; s.innerHTML = '<option value="">Golpe</option>';
            unique.forEach(m => s.innerHTML += `<option value="${m}">${m}</option>`);
            if(restoreData) s.value = restoreData[`p${slot}-m${i}`]; else s.value = cur;
        }
    }

    function convertSheet() {
        const d = (id) => document.getElementById(id).value || "---";
        
        // Formataﺣ۶ﺣ۲o da Bolsa
        const bagLines = document.getElementById('t-bag').value.split('\n').filter(l => l.trim() !== "");
        let bagText = "";
        const linesToRender = Math.max(3, bagLines.length);
        for(let i=0; i < linesToRender; i++) {
            bagText += `ﻗﺍﻗﻗ۳ ${bagLines[i] || ""}\n`;
        }

        // Formataﺣ۶ﺣ۲o dos Pokﺣ۸mons
        let pkmnText = "";
        for(let i=1; i<=6; i++) {
            const pName = document.getElementById(`p${i}-name`).value;
            const pLvl = document.getElementById(`p${i}-lvl`).value;
            pkmnText += `ﻗﺍﻗﻗ۳ ${pName ? `${pName} (Lv. ${pLvl})` : "Vazio"}\n`;
        }

        const template = `ﻗﻗ۶ﻗﺯﻗ۶Ficha do Treinadorﻗ۶ﺯﻗﻗ۶ﻗ

- Nome do Treinador: ${d('t-name')}
- Sexo: ${d('t-sex')}
- Idade: ${d('t-age')}
- Aparﺣ۹ncia: ${d('t-appearance')}
- Altura: ${d('t-height')}
- Classe: ${d('t-class')}
- Dinheiro: ﻗﺛ ${d('t-money')}

ﻗﻗﻗﻗﻗﺍBOLSAﻗﺎﻗﻗﻗﻗ
${bagText}
ﻗﻗﻗﻗﻗ۲ﻗﻗﻗ۳POKﺣMONSﻗ۱ﻗﻗﻗ۲ﻗﻗﻗﻗﻗ
${pkmnText}
ﻗﻗﻗﻗﻗ۲ﻗﻗﻗ۳INSﺣGNIASﻗ۱ﻗﻗﻗ۲ﻗﻗﻗﻗﻗ
ﻭ1ﻭ ﻭ2ﻭ ﻭ3ﻭ ﻭ4ﻭ ﻭ5ﻭ ﻭ6ﻭ ﻭ7ﻭ ﻭ8ﻭ

ﻗﻗﻗﻗﻗ۲ﻗﻗﻗ۳ﺣﺣﺣﺣﺣﺣﺣﻗ۱ﻗﻗﻗ۲ﻗﻗﻗﻗﻗ`;

        const res = document.getElementById('convert-result');
        res.innerText = template;
        res.style.display = 'block';
        alert("Ficha convertida! Role para baixo para copiar.");
    }

    async function cloudAction(type) {
        const user = document.getElementById('user-id').value;
        const pass = document.getElementById('user-pass').value;
        if(!user || !pass) return alert("Dados incompletos.");
        if(type === 'save') {
            const sheet = {}; document.querySelectorAll('.save').forEach(el => sheet[el.id] = el.value);
            const { error } = await _supabase.from('fichas').upsert({ username: user, password: pass, data: sheet, avatar: document.getElementById('main-avatar').src }, { onConflict: 'username' });
            if(error) alert(error.message); else alert("Salvo!");
        } else {
            const { data } = await _supabase.from('fichas').select('*').eq('username', user).single();
            if(data && data.password === pass) {
                Object.keys(data.data).forEach(id => { const el = document.getElementById(id); if(el) el.value = data.data[id]; });
                if(data.avatar) { const img = document.getElementById('main-avatar'); img.src = data.avatar; img.style.display='block'; document.getElementById('placeholder').style.display='none'; }
                updateCities(); document.getElementById('t-city').value = data.data['t-city'];
                for(let i=1; i<=6; i++) { if(data.data[`p${i}-name`]) selectPkmn(i, data.data[`p${i}-name`].toLowerCase().replace(/ /g, '-'), data.data); }
                alert("Carregado!");
            } else alert("Erro nos dados.");
        }
    }

    function updateCities() {
        const r = document.getElementById('t-region').value; const s = document.getElementById('t-city');
        const cur = s.value; s.innerHTML = '<option value="">Cidade...</option>';
        if(worldData[r]) worldData[r].forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
        if(cur) s.value = cur;
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        if(!e.target.files.length) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = document.getElementById('image-to-crop'); img.src = event.target.result;
            document.getElementById('crop-modal').style.display = 'flex';
            if(cropper) cropper.destroy();
            cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1, dragMode: 'move', autoCropArea: 1, cropBoxMovable: false, cropBoxResizable: false });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function finishCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
        const mainImg = document.getElementById('main-avatar');
        mainImg.src = canvas.toDataURL(); mainImg.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('crop-modal').style.display = 'none';
    }

    init();
</script>
</body>
</html>

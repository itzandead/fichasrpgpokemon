<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSheet Pro — Elite Trainer Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg-deep: #080a12;
            --bg-panel: rgba(22, 28, 45, 0.7);
            --primary: #ff4757;
            --secondary: #3e82ff;
            --accent: #00d2d3;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: blur(12px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #080a12);
            color: var(--text-main); 
            padding: 20px; 
            min-height: 100vh;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: auto; display: flex; flex-direction: column; gap: 30px; }

        /* Auth Bar Modernizada */
        .auth-bar { 
            background: var(--bg-panel);
            backdrop-filter: var(--glass);
            padding: 15px 30px; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            border: 1px solid var(--border); 
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; background: linear-gradient(90deg, var(--primary), #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .auth-inputs { display: flex; gap: 12px; }
        .auth-inputs input { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border); 
            color: white; 
            padding: 10px 15px; 
            border-radius: 12px; 
            width: 160px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .auth-inputs input:focus { border-color: var(--secondary); outline: none; background: rgba(0,0,0,0.5); }

        /* Seções */
        .section-header { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 5px;
        }
        .section-header h2 { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .line { height: 1px; flex: 1; background: var(--border); }

        .panel { 
            background: var(--bg-panel); 
            backdrop-filter: var(--glass);
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
        }

        /* Avatar */
        .header-top { display: flex; gap: 40px; align-items: flex-start; flex-wrap: wrap; }
        .avatar-wrapper { position: relative; }
        .avatar-box { 
            width: 160px; height: 160px; 
            background: #111827; 
            border: 3px solid var(--border); 
            border-radius: 40px; 
            overflow: hidden; 
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .avatar-box:hover { transform: scale(1.02); border-color: var(--secondary); box-shadow: 0 0 20px rgba(62, 130, 255, 0.3); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Inputs Gerais */
        .grid-header { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        
        input, select, textarea { 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 14px; 
            border-radius: 14px; 
            font-size: 0.95rem; 
            transition: all 0.3s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--secondary); background: rgba(15, 23, 42, 0.9); box-shadow: 0 0 0 4px rgba(62, 130, 255, 0.1); outline: none; }

        /* Pokémon Cards */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
        .pkmn-card { 
            background: rgba(30, 41, 59, 0.5); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
            transition: 0.3s;
        }
        .pkmn-card:hover { background: rgba(30, 41, 59, 0.8); transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
        
        .sprite-container { 
            width: 80px; height: 80px; 
            background: #0f172a; 
            border-radius: 18px; 
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border);
        }
        .sprite-container img { width: 70px; height: 70px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }

        /* Inventário */
        .inv-grid { display: grid; grid-template-columns: 1fr 280px; gap: 25px; }
        .money-card { 
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%); 
            border-radius: 20px; 
            padding: 25px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .money-card input { background: transparent; border: none; font-size: 2rem; text-align: center; font-weight: 800; color: #34d399; width: 100%; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        /* Botões */
        .btn { 
            padding: 14px 24px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; transition: all 0.3s;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-blue { background: linear-gradient(135deg, #3e82ff 0%, #2563eb 100%); color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-convert { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: white; width: 100%; font-size: 0.9rem; margin-top: 20px; height: 55px; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .btn:active { transform: translateY(0); }

        /* Resultados */
        #convert-result { 
            display: none; margin-top: 25px; 
            background: #020617; color: #10b981; 
            font-family: 'Fira Code', monospace; padding: 25px; 
            border-radius: 18px; border: 1px solid #1e293b; 
            white-space: pre-wrap; font-size: 0.9rem; 
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal */
        #crop-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; 
            backdrop-filter: blur(10px);
        }
        .crop-container { width: 100%; max-width: 450px; height: 450px; background: #000; border-radius: 30px; overflow: hidden; border: 1px solid var(--border); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    </style>
</head>
<body>

<div class="container">
    <div class="auth-bar">
        <div class="logo">POKÉSHEET PRO</div>
        <div class="auth-inputs">
            <input type="text" id="user-id" placeholder="Usuário">
            <input type="password" id="user-pass" placeholder="Senha">
            <button class="btn btn-green" onclick="cloudAction('save')">Salvar</button>
            <button class="btn btn-blue" onclick="cloudAction('load')">Entrar</button>
        </div>
    </div>

    <div class="section-header">
        <h2>Ficha de Treinador</h2>
        <div class="line"></div>
    </div>
    
    <div class="panel header-top">
        <div class="avatar-wrapper">
            <div onclick="document.getElementById('file-input').click()" class="avatar-box">
                <img id="main-avatar" style="display:none">
                <span id="placeholder">ADICIONAR FOTO</span>
            </div>
            <input type="file" id="file-input" hidden accept="image/*">
        </div>
        
        <div class="grid-header">
            <div class="input-group" style="grid-column: span 2;">
                <label>Nome do Treinador</label>
                <input type="text" id="t-name" class="save" placeholder="Ex: Red Ketchum">
            </div>
            <div class="input-group">
                <label>Sexo</label>
                <select id="t-sex" class="save">
                    <option value="">Escolher...</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>
            <div class="input-group">
                <label>Idade <span style="color:var(--primary)">• Mín. 10</span></label>
                <input type="number" id="t-age" class="save" min="10" placeholder="10">
            </div>
            <div class="input-group">
                <label>Altura</label>
                <input type="text" id="t-height" class="save" placeholder="1.70m">
            </div>
            <div class="input-group">
                <label>Classe</label>
                <select id="t-class" class="save">
                    <option value="Treinador">Treinador</option>
                    <option value="Coordenador">Coordenador</option>
                    <option value="Criador">Criador</option>
                    <option value="Pesquisador">Pesquisador</option>
                    <option value="Ranger">Pokémon Ranger</option>
                    <option value="Rocket">Equipe Rocket</option>
                </select>
            </div>
            <div class="input-group">
                <label>Região</label>
                <select id="t-region" class="save" onchange="updateCities()"></select>
            </div>
            <div class="input-group">
                <label>Cidade</label>
                <select id="t-city" class="save"></select>
            </div>
            <div class="input-group" style="grid-column: span 3;">
                <label>Aparência (Descrição Visual ou Fonte)</label>
                <input type="text" id="t-appearance" class="save" placeholder="Ex: Trajes de Galar, olhos castanhos...">
            </div>
        </div>
    </div>

    <div class="section-header">
        <h2>Equipe Pokémon</h2>
        <div class="line"></div>
    </div>
    <div id="team" class="team-grid"></div>

    <div class="section-header">
        <h2>Inventário & Recursos</h2>
        <div class="line"></div>
    </div>
    <div class="panel inv-grid">
        <div class="input-group">
            <label>Bolsa de Itens</label>
            <textarea id="t-bag" class="save" rows="6" placeholder="Pocão x5&#10;Pokébola x10&#10;Mapa de Região..."></textarea>
        </div>
        <div class="money-card">
            <label>SALDO ATUAL</label>
            <input type="text" id="t-money" class="save" value="0">
            <span style="font-size: 0.7rem; color: #6ee7b7; margin-top: 10px; font-weight: 700;">MOEDA: POKÉDOLLAR (₽)</span>
        </div>
    </div>

    <div class="panel">
        <label>Anotações Adicionais</label>
        <textarea id="notes" class="save" rows="3" placeholder="Insígnias, conquistas ou história..."></textarea>
        <button class="btn btn-convert" onclick="convertSheet()">Gerar Ficha Textual para RPG</button>
        <div id="convert-result"></div>
    </div>
</div>

<div id="crop-modal">
    <div class="crop-container"><img id="image-to-crop"></div>
    <div style="margin-top:30px; display:flex; gap:15px;">
        <button class="btn" style="background:rgba(255,255,255,0.1); color: white;" onclick="document.getElementById('crop-modal').style.display='none'">CANCELAR</button>
        <button class="btn btn-green" onclick="finishCrop()">CORTAR E SALVAR</button>
    </div>
</div>

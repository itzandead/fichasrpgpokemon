<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon: Aurélia</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg: #05080f;
            --surface: rgba(20, 27, 45, 0.7);
            --primary: #ff3e3e;
            --secondary: #3b82f6;
            --accent: #10b981;
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --shiny: #ffce4b;
            --money: #fbbf24;
            --male: #60a5fa;
            --female: #f472b6;
        }

        /* CURSOR PERSONALIZADO */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: url('https://cur.cursors-4u.net/games/gam-13/gam1282.cur'), auto !important;
        }
        
        button, a, input, select, textarea, .avatar-box, .shiny-toggle, .gender-btn {
            cursor: url('https://cur.cursors-4u.net/games/gam-13/gam1281.cur'), pointer !important;
        }

        body { background: radial-gradient(circle at top right, #111827, #05080f); color: var(--text); padding: 15px; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 20px; }

        /* NOTIFICAÇÃO */
        #notification-host { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { 
            background: var(--surface); backdrop-filter: blur(15px); border: 1px solid var(--border); 
            color: white; padding: 15px 25px; border-radius: 15px; font-weight: 600; font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px;
            animation: slideIn 0.3s ease-out forwards; border-left: 4px solid var(--secondary);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.success { border-left-color: var(--accent); }
        .toast.error { border-left-color: var(--primary); }

        .auth-bar { background: var(--surface); backdrop-filter: blur(15px); padding: 18px 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.4); flex-wrap: wrap; gap: 15px; }
        
        .logo-container { position: relative; display: inline-block; padding-right: 40px; }
        .logo { 
            font-family: 'Unbounded', cursive; font-weight: 900; font-size: 1.4rem; letter-spacing: -1px; color: #ffcb05;
            text-shadow: 3px 3px 0px #3b4cca, -1px -1px 0px #3b4cca, 1px -1px 0px #3b4cca, -1px 1px 0px #3b4cca, 1px 1px 0px #3b4cca;
            text-transform: uppercase;
        }
        .pikachu-climb {
            position: absolute; right: -5px; top: -15px; width: 50px; height: 50px;
            background: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif') no-repeat center;
            background-size: contain; animation: hang 3s ease-in-out infinite; pointer-events: none;
        }
        @keyframes hang { 0%, 100% { transform: translateY(0) rotate(5deg); } 50% { transform: translateY(5px) rotate(-5deg); } }

        .auth-inputs { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .auth-buttons { display: flex; gap: 8px; }
        .pass-container { position: relative; display: flex; align-items: center; }
        .pass-container input { padding-right: 35px; width: 140px; }
        .toggle-pass { position: absolute; right: 10px; cursor: pointer; opacity: 0.6; font-size: 0.8rem; }

        .tabs-nav { display: flex; gap: 10px; margin-bottom: -10px; overflow-x: auto; }
        .tab-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 12px 25px; border-radius: 15px 15px 0 0; cursor: pointer; font-weight: 700; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: var(--secondary); color: white; border-bottom: none; }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; gap: 25px; }

        .section-tag { display: flex; align-items: center; gap: 10px; margin-bottom: -10px; }
        .section-tag h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }
        .line { height: 1px; flex: 1; background: var(--border); }

        .panel { background: var(--surface); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; }
        .trainer-header { display: flex; gap: 25px; flex-direction: column; align-items: center; }
        
        .avatar-box { 
            width: 140px; height: 140px; border-radius: 50%; 
            background: #000; border: 3px solid var(--border); 
            overflow: hidden; display: flex; 
            align-items: center; justify-content: center; position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .avatar-box:hover { border-color: var(--secondary); transform: scale(1.05); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .form-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .full-width { grid-column: span 2; }
        label { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }

        input, select, textarea { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 12px; font-size: 0.85rem; width: 100%; transition: 0.3s; }
        input:focus { border-color: var(--secondary); outline: none; background: rgba(0,0,0,0.4); }

        .bag-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .bag-sprite { 
            width: 50px; height: 45px; 
            background-image: url('https://i.ibb.co/SwH03wrc/Pt-bag.png');
            background-repeat: no-repeat; background-size: 100px 45px; 
            image-rendering: pixelated; transition: background-position 0.2s steps(1);
        }
        .bag-male { background-position: 0px 0px; }
        .bag-female { background-position: -50px 0px; }

        .money-card { 
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(0,0,0,0.3));
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 16px; padding: 12px 18px; display: flex; align-items: center; gap: 15px;
            width: fit-content; min-width: 200px; margin-top: 15px;
        }
        .money-symbol { font-family: 'Unbounded'; font-size: 1.5rem; color: var(--money); text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .money-input-wrapper { flex: 1; }
        .money-input-wrapper input { background: transparent; border: none; padding: 0; font-size: 1.2rem; font-weight: 800; color: var(--money); width: 100%; }

        /* POKEMON CARD STYLES */
        .team-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .pkmn-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 22px; padding: 15px; display: flex; flex-direction: column; gap: 10px; position: relative; }
        .pkmn-header { display: flex; gap: 12px; align-items: center; }
        .sprite-frame { width: 85px; height: 85px; background: #000; border-radius: 18px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .pkmn-img { width: 100%; height: 100%; object-fit: contain; transform: scale(1.35); image-rendering: pixelated; position: absolute; top: 0; left: 0; }
        
        /* ANIMACAO EVOLUCAO */
        @keyframes evo-flash-anim {
            0% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(10) contrast(0); transform: scale(1.1); }
            100% { filter: brightness(1); transform: scale(1); }
        }
        .evo-flash { animation: evo-flash-anim 1.5s ease-in-out; }

        .gimmick-badge { position: absolute; bottom: 5px; right: 5px; width: 28px; height: 28px; background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none; z-index: 10; filter: drop-shadow(0 0 2px black); }
        .shiny-toggle { position: absolute; top: 5px; left: 5px; z-index: 15; font-size: 1.2rem; filter: grayscale(1); transition: 0.3s; }
        .shiny-toggle.active { filter: grayscale(0) drop-shadow(0 0 5px var(--shiny)); }

        .gender-selector { display: flex; gap: 5px; margin-top: 5px; flex-direction: column; }
        .gender-btns-row { display: flex; gap: 5px; }
        .gender-btn { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 5px; font-size: 0.9rem; color: var(--text-dim); transition: 0.3s; }
        .gender-btn.active.male { background: var(--male); color: white; border-color: #93c5fd; }
        .gender-btn.active.female { background: var(--female); color: white; border-color: #f9a8d4; }
        .gender-btn.disabled { opacity: 0.1; pointer-events: none; }

        .stats-container { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .stat-row { display: grid; grid-template-columns: 80px 1fr 1fr 1fr; gap: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .stat-label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); }
        .stat-val { font-weight: 700; color: var(--accent); text-align: center; }
        .points-badge { background: var(--secondary); padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; margin-bottom: 10px; display: inline-block; }

        .search-area { position: relative; flex: 1; }
        .results-box { position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border-radius: 10px; z-index: 100; max-height: 150px; overflow-y: auto; display: none; border: 1px solid var(--secondary); }
        .results-box div { padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
        .results-box div:hover { background: rgba(255,255,255,0.1); }
        .results-box img { width: 24px; height: 24px; object-fit: contain; }

        .btn { padding: 10px 15px; border-radius: 10px; border: none; font-weight: 700; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-green { background: var(--accent); color: #05080f; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-evolve { background: #a855f7; color: white; width: 100%; margin-top: 5px; font-size: 0.6rem; display: none; }
        .btn-box { background: #64748b; color: white; margin-top: 10px; }
        
        .actions-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .btn-convert { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; width: 100%; padding: 15px; font-size: 0.9rem; }
        .btn-pkmn-ficha { background: var(--secondary); color: white; margin-top: 10px; font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.2); }
        
        .result-box { display: none; margin-top: 15px; background: #000; color: var(--accent); padding: 15px; border-radius: 12px; border: 1px dashed var(--accent); font-family: monospace; white-space: pre-wrap; font-size: 0.8rem; overflow-x: auto; position: relative; }
        .btn-copy-float { background: #334155; color: white; width: 100%; padding: 12px; font-size: 0.8rem; margin-top: 10px; border-radius: 10px; border: none; display: none; cursor: pointer; }

        /* BOXES TAB */
        .box-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .box-slot { background: rgba(0,0,0,0.3); border: 1px dashed var(--border); border-radius: 15px; padding: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; min-height: 140px; }
        .box-slot img { width: 60px; height: 60px; object-fit: contain; image-rendering: pixelated; }
        .box-slot span { font-size: 0.7rem; font-weight: 700; margin-top: 5px; display: block; }

        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .crop-wrap { width: 90vw; height: 90vw; max-width: 400px; max-height: 400px; background: #111; border-radius: 10px; overflow: hidden; }

        /* MODAL EVOLUCAO LISTA */
        #evo-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10001; align-items: center; justify-content: center; }
        .evo-modal-content { background: var(--bg); border: 1px solid var(--secondary); padding: 25px; border-radius: 20px; max-width: 300px; text-align: center; }

        @media (min-width: 768px) {
            .trainer-header { flex-direction: row; align-items: center; }
            .form-grid { grid-template-columns: repeat(4, 1fr); }
            .team-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (min-width: 1024px) { .team-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div id="notification-host"></div>

<div class="container">
    <div class="auth-bar">
        <div class="logo-container">
            <div class="logo">Pokémon: Aurélia</div>
            <div class="pikachu-climb"></div>
        </div>
        <div class="auth-inputs">
            <input type="text" id="user-id" placeholder="ID">
            <div class="pass-container">
                <input type="password" id="user-pass" placeholder="Senha">
                <span class="toggle-pass" onclick="togglePassword()">👁️</span>
            </div>
            <div class="auth-buttons">
                <button class="btn btn-green" onclick="cloudAction('save')">Salvar</button>
                <button class="btn btn-blue" onclick="cloudAction('load')">Carregar</button>
            </div>
        </div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="openTab('tab-trainer', this)">TREINADOR</button>
        <button class="tab-btn" onclick="openTab('tab-pokemon', this)">TIME POKÉMON</button>
        <button class="tab-btn" onclick="openTab('tab-boxes', this)">BOXES (PC)</button>
    </div>

    <div id="tab-trainer" class="tab-content active">
        <div class="section-tag"><h2>Identificação</h2><div class="line"></div></div>
        <div class="panel trainer-header">
            <div class="avatar-wrapper">
                <div onclick="document.getElementById('file-input').click()" class="avatar-box">
                    <img id="main-avatar" style="display:none">
                    <span id="placeholder" style="font-size:0.6rem; color:var(--text-dim); text-align:center; padding: 10px;">ADICIONAR FOTO</span>
                </div>
                <input type="file" id="file-input" hidden accept="image/*">
            </div>
            <div class="form-grid">
                <div class="input-group full-width"><label>Nome</label><input type="text" id="t-name" class="save"></div>
                <div class="input-group"><label>Sexo</label><select id="t-sex" class="save" onchange="updateBagIcon()"><option value="">-</option><option value="Masculino">Masculino</option><option value="Feminino">Feminino</option><option value="Outro">Outro</option></select></div>
                <div class="input-group"><label>Idade</label><input type="number" id="t-age" class="save" min="10"></div>
                <div class="input-group"><label>Altura</label><input type="text" id="t-height" class="save" placeholder="Ex: 1.75"></div>
                <div class="input-group"><label>Classe</label>
                    <select id="t-class" class="save">
                        <option value="Treinador (a)">Treinador (a)</option>
                        <option value="Coordenador (a)">Coordenador (a)</option>
                        <option value="Cuidador (a)">Cuidador (a)</option>
                        <option value="Professor (a)">Professor (a)</option>
                        <option value="Enfermeiro (a)">Enfermeiro (a)</option>
                        <option value="Guarda">Guarda</option>
                        <option value="Policial">Policial</option>
                        <option value="Fotógrafo (a)">Fotógrafo (a)</option>
                        <option value="Pesquisador (a)">Pesquisador (a)</option>
                        <option value="Rocket">Rocket</option>
                        <option value="Fazendeiro (a)">Fazendeiro (a)</option>
                        <option value="Cientista">Cientista</option>
                    </select>
                </div>
                <div class="input-group"><label>Região</label><select id="t-region" class="save" onchange="updateCities()"></select></div>
                <div class="input-group"><label>Cidade</label><select id="t-city" class="save"></select></div>
                <div class="input-group full-width"><label>Aparência</label><input type="text" id="t-appearance" class="save"></div>
            </div>
        </div>

        <div class="section-tag"><h2>Inventário</h2><div class="line"></div></div>
        <div class="panel">
            <div class="bag-header">
                <div id="bag-icon-display" class="bag-sprite bag-male"></div>
                <label>Mochila</label>
            </div>
            <textarea id="t-bag" class="save" rows="4" placeholder="Ex: 1 Pokeball, 1 Poção"></textarea>
            <div class="money-card">
                <div class="money-symbol">₽</div>
                <div class="money-input-wrapper">
                    <label>Saldo Atual</label>
                    <input type="number" id="t-money" class="save" value="0">
                </div>
            </div>
        </div>
        
        <div class="actions-group">
            <button class="btn btn-convert" onclick="convertSheet()">✨ GERAR FICHA EM TEXTO</button>
            <div id="convert-result-trainer" class="result-box"></div>
            <button id="copy-btn-trainer" class="btn-copy-float" onclick="copyToClipboard('convert-result-trainer')">📋 COPIAR PARA O CLIPBOARD</button>
        </div>
    </div>

    <div id="tab-pokemon" class="tab-content">
        <div class="section-tag"><h2>Gestão de Equipe</h2><div class="line"></div></div>
        <div id="team" class="team-grid"></div>
        <div class="actions-group">
            <div id="convert-result-pokemon" class="result-box"></div>
            <button id="copy-btn-pokemon" class="btn-copy-float" onclick="copyToClipboard('convert-result-pokemon')">📋 COPIAR FICHA DO POKÉMON</button>
        </div>
    </div>

    <div id="tab-boxes" class="tab-content">
        <div class="section-tag"><h2>Sistema de Boxes (Slots Infinitos)</h2><div class="line"></div></div>
        <div class="panel">
            <div id="boxes-container" class="box-grid"></div>
        </div>
    </div>
</div>

<div id="evo-modal">
    <div class="evo-modal-content">

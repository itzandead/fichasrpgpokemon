<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSheet Cloud v5.6 - Organizador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg: #0b0f1a; --card: #161e2d; --primary: #ff4747; 
            --secondary: #4785ff; --text: #f1f5f9; --muted: #64748b;
            --border: #2d3748; --input: #0b0f1a; --accent: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 10px; padding-bottom: 50px; }
        .container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 25px; }
        
        /* Cabeçalhos de Seção */
        .section-title { font-size: 1.4rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--border); padding-bottom: 8px; margin-top: 10px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: '◈'; color: var(--secondary); }

        .auth-bar { background: linear-gradient(90deg, #1a202c, #2d3748); padding: 15px 20px; border-radius: 12px; display: flex; gap: 12px; align-items: center; border: 1px solid var(--border); justify-content: space-between; flex-wrap: wrap; }
        .auth-inputs { display: flex; gap: 8px; align-items: center; }
        .auth-bar input { background: #000; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; width: 140px; }

        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: 0 15px 25px rgba(0,0,0,0.4); }
        .header-top { border-left: 6px solid var(--primary); display: flex; gap: 25px; flex-wrap: wrap; align-items: flex-start; }
        
        .avatar-box { width: 140px; height: 140px; background: var(--input); border: 2px dashed var(--muted); border-radius: 50%; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .grid-header { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        label { font-size: 0.62rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        input, select, textarea { background: var(--input); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; width: 100%; outline: none; font-size: 0.9rem; }
        input:focus { border-color: var(--secondary); }
        
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 18px; }
        .pkmn-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .sprite-box { width: 70px; height: 70px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .sprite-box img { width: 65px; height: 65px; }

        .search-container { position: relative; flex: 1; }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: #1a202c; border: 1px solid var(--secondary); border-radius: 8px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
        .search-results div { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); }

        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-green { background: var(--accent); color: white; }
        .btn-convert { background: #8b5cf6; color: white; width: 100%; font-size: 1rem; margin-top: 10px; }

        /* Estilo Inventário */
        .inv-grid { display: grid; grid-template-columns: 1fr 200px; gap: 15px; }
        .money-display { background: #064e3b; border: 2px solid var(--accent); color: #fff; padding: 20px; border-radius: 12px; text-align: center; }
        .money-display input { background: transparent; border: none; font-size: 1.5rem; text-align: center; font-weight: bold; color: var(--accent); }

        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .crop-container { width: 100%; max-width: 400px; height: 400px; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        
        #convert-result { display: none; margin-top: 20px; background: #000; color: #10b981; font-family: monospace; padding: 15px; border-radius: 8px; border: 1px solid var(--accent); white-space: pre-wrap; font-size: 0.85rem; }
    </style>
</head>
<body>

        <div class="auth-inputs">

            <input type="password" id="user-pass" placeholder="Senha">

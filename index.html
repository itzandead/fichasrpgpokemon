<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSheet Cloud Ultra - Advanced Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg: #05080f;
            --surface: rgba(20, 27, 45, 0.7);
            --primary: #ff3e3e;
            --secondary: #3b82f6;
            --accent: #10b981;
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --shiny: #ffce4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top right, #111827, #05080f); color: var(--text); padding: 15px; min-height: 100vh; }
        .container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 20px; }

        .auth-bar { background: var(--surface); backdrop-filter: blur(15px); padding: 18px 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.4); flex-wrap: wrap; gap: 15px; }
        .logo { font-weight: 800; font-size: 1.3rem; letter-spacing: -1px; background: linear-gradient(to right, #ff3e3e, #f87171); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-inputs { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .pass-container { position: relative; display: flex; align-items: center; }
        .pass-container input { padding-right: 35px; }
        .toggle-pass { position: absolute; right: 10px; cursor: pointer; opacity: 0.6; font-size: 0.8rem; }

        .tabs-nav { display: flex; gap: 10px; margin-bottom: -10px; }
        .tab-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 12px 25px; border-radius: 15px 15px 0 0; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--secondary); color: white; border-bottom: none; }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; gap: 25px; }

        .section-tag { display: flex; align-items: center; gap: 10px; margin-bottom: -10px; }
        .section-tag h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }
        .line { height: 1px; flex: 1; background: var(--border); }

        .panel { background: var(--surface); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; }
        .trainer-header { display: flex; gap: 20px; flex-direction: column; align-items: center; }
        
        .avatar-box { width: 140px; height: 140px; border-radius: 30px; background: #000; border: 2px dashed var(--border); cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .form-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .full-width { grid-column: span 2; }
        label { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }

        input, select, textarea { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 12px; font-size: 0.85rem; width: 100%; }

        .stats-container { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .stat-row { display: grid; grid-template-columns: 80px 1fr 1fr 1fr; gap: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .stat-label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); }
        .stat-val { font-weight: 700; color: var(--accent); text-align: center; }
        .points-badge { background: var(--secondary); padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; margin-bottom: 10px; display: inline-block; }

        .team-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .pkmn-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 22px; padding: 15px; display: flex; flex-direction: column; gap: 10px; position: relative; }
        .pkmn-header { display: flex; gap: 12px; align-items: center; }
        
        .sprite-frame { width: 85px; height: 85px; background: #000; border-radius: 18px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .sprite-frame img.pkmn-img { width: 100%; height: 100%; object-fit: contain; transform: scale(1.35); image-rendering: pixelated; }
        
        .gimmick-badge { position: absolute; bottom: 5px; right: 5px; width: 28px; height: 28px; background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none; z-index: 10; filter: drop-shadow(0 0 2px black); }

        .shiny-toggle { position: absolute; top: 5px; left: 5px; cursor: pointer; z-index: 15; font-size: 1.2rem; filter: grayscale(1); transition: 0.3s; }
        .shiny-toggle.active { filter: grayscale(0) drop-shadow(0 0 5px var(--shiny)); }

        .search-area { position: relative; flex: 1; }
        .results-box { position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border-radius: 10px; z-index: 100; max-height: 150px; overflow-y: auto; display: none; }
        .results-box div { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        .btn { padding: 10px 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; }
        .btn-green { background: var(--accent); color: #05080f; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-convert { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; width: 100%; margin-top: 10px; padding: 15px; font-size: 0.9rem; }

        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .crop-wrap { width: 85vw; height: 85vw; max-width: 350px; max-height: 350px; background: #000; overflow: hidden; }

        @media (min-width: 768px) {
            .trainer-header { flex-direction: row; align-items: flex-start; }
            .form-grid { grid-template-columns: repeat(4, 1fr); }
            .team-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (min-width: 1024px) { .team-grid { grid-template-columns: repeat(3, 1fr); } }

        #convert-result { display: none; margin-top: 15px; background: #000; color: var(--accent); padding: 15px; border-radius: 12px; border: 1px dashed var(--accent); font-family: monospace; white-space: pre-wrap; font-size: 0.8rem; overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-bar">
        <div class="logo">POKÉSHEET CLOUD</div>
        <div class="auth-inputs">
            <input type="text" id="user-id" placeholder="ID">
            <div class="pass-container">
                <input type="password" id="user-pass" placeholder="Senha">
                <span class="toggle-pass" onclick="togglePassword()">👁️</span>
            </div>
            <button class="btn btn-green" onclick="cloudAction('save')">Salvar</button>
            <button class="btn btn-blue" onclick="cloudAction('load')">Entrar</button>
        </div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="openTab('tab-trainer', this)">TREINADOR</button>
        <button class="tab-btn" onclick="openTab('tab-pokemon', this)">TIME POKÉMON</button>
    </div>

    <div id="tab-trainer" class="tab-content active">
        <div class="section-tag"><h2>Identificação</h2><div class="line"></div></div>
        <div class="panel trainer-header">
            <div class="avatar-wrapper">
                <div onclick="document.getElementById('file-input').click()" class="avatar-box">
                    <img id="main-avatar" style="display:none">
                    <span id="placeholder" style="font-size:0.6rem; color:var(--text-dim)">FOTO / AVATAR</span>
                </div>
                <input type="file" id="file-input" hidden accept="image/*">
            </div>
            <div class="form-grid">
                <div class="input-group full-width"><label>Nome</label><input type="text" id="t-name" class="save"></div>
                <div class="input-group"><label>Sexo</label><select id="t-sex" class="save"><option value="">-</option><option value="Masculino">Masculino</option><option value="Feminino">Feminino</option><option value="Outro">Outro</option></select></div>
                <div class="input-group"><label>Idade</label><input type="number" id="t-age" class="save" min="10"></div>
                <div class="input-group"><label>Altura</label><input type="text" id="t-height" class="save" placeholder="Ex: 1.75m"></div>
                <div class="input-group"><label>Classe</label><select id="t-class" class="save"><option value="Treinador">Treinador</option><option value="Coordenador">Coordenador</option><option value="Criador">Criador</option><option value="Pesquisador">Pesquisador</option><option value="Ranger">Ranger</option><option value="Rocket">Equipe Rocket</option></select></div>
                <div class="input-group"><label>Região</label><select id="t-region" class="save" onchange="updateCities()"></select></div>
                <div class="input-group full-width"><label>Cidade</label><select id="t-city" class="save"></select></div>
                <div class="input-group full-width"><label>Aparência</label><input type="text" id="t-appearance" class="save"></div>
            </div>
        </div>

        <div class="section-tag"><h2>Inventário</h2><div class="line"></div></div>
        <div class="panel">
            <div class="input-group"><label>Itens no Inventário</label><textarea id="t-bag" class="save" rows="4"></textarea></div>
            <div style="margin-top:10px"><label style="color:var(--accent)"> ₽ DINHEIRO</label><br><input type="text" id="t-money" class="save" value="0"></div>
        </div>
        
        <button class="btn btn-convert" onclick="convertSheet()">✨ GERAR FICHA EM TEXTO</button>
        <div id="convert-result"></div>
    </div>

    <div id="tab-pokemon" class="tab-content">
        <div class="section-tag"><h2>Gestão de Equipe</h2><div class="line"></div></div>
        <div id="team" class="team-grid"></div>
    </div>
</div>

<div id="crop-modal">
    <div class="crop-wrap"><img id="image-to-crop"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="btn" style="background:#444" onclick="document.getElementById('crop-modal').style.display='none'">CANCELAR</button>
        <button class="btn btn-green" onclick="finishCrop()">SALVAR</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>

    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqZ2dmZGppeGVub3BraWl1Z21qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjIwMDcsImV4cCI6MjA5MTY5ODAwN30.QWr9d3qT2216to7VOEmc_hzu-g789FTLdYdDUtUosk0';

    const natures = {
        'Adamant': {plus: 'atk', minus: 'spa'}, 'Bold': {plus: 'def', minus: 'atk'}, 'Brave': {plus: 'atk', minus: 'spe'},

        "Kanto": ["Pallet Town", "Viridian City", "Pewter City", "Cerulean City", "Vermilion City", "Lavender Town", "Celadon City", "Fuchsia City", "Saffron City", "Cinnabar Island"],
        "Johto": ["New Bark Town", "Cherrygrove City", "Violet City", "Azalea Town", "Goldenrod City", "Ecruteak City", "Olivine City", "Cianwood City", "Mahogany Town", "Blackthorn City"],
        "Hoenn": ["Littleroot Town", "Oldale Town", "Petalburg City", "Rustboro City", "Dewford Town", "Slateport City", "Mauville City", "Verdanturf Town", "Fallarbor Town", "Lavaridge Town", "Fortree City", "Lilycove City", "Mossdeep City", "Sootopolis City"],
        "Sinnoh": ["Twinleaf Town", "Sandgem Town", "Jubilife City", "Oreburgh City", "Floaroma Town", "Eterna City", "Hearthome City", "Solaceon Town", "Veilstone City", "Pastoria City", "Celestic Town", "Canalave City", "Snowpoint City", "Sunyshore City"],
        "Unova": ["Nuvema Town", "Accumula Town", "Striaton City", "Nacrene City", "Castelia City", "Nimbasa City", "Driftveil City", "Mistralton City", "Icirrus City", "Opelucid City", "Humilau City"],
        "Kalos": ["Vaniville Town", "Santalune City", "Lumiose City", "Camphrier Town", "Cyllage City", "Ambrette Town", "Shalour City", "Coumarine City", "Laverre City", "Dendemille Town", "Anistar City", "Snowbelle City"],
        "Alola": ["Hau'oli City", "Heahea City", "Konikoni City", "Malie City", "Tapu Village", "Seafolk Village"],
        "Galar": ["Postwick", "Wedgehurst", "Motostoke", "Turffield", "Hulbury", "Hammerlocke", "Stow-on-Side", "Ballonlea", "Circhester", "Spikemuth", "Wyndon"],
        "Paldea": ["Cabo Poco", "Mesagoza", "Cortondo", "Artazon", "Levincia", "Cascarrafa", "Porto Marinada", "Medali", "Montenevera", "Alfornada", "Glaseado"]
    };

    function format(str) { return str.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); }

    function togglePassword() {
        const pass = document.getElementById('user-pass');
        pass.type = pass.type === 'password' ? 'text' : 'password';
    }

    function openTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function init() {
        const regSelect = document.getElementById('t-region');
        regSelect.innerHTML = '<option value="">Região...</option>';
        Object.keys(worldData).forEach(r => regSelect.innerHTML += `<option value="${r}">${r}</option>`);
        renderSlots();
        try {
            const r = await fetch('https://pokeapi.co/api/v2/pokemon?limit=10000');
            const d = await r.json();
            allPkmn = d.results;
        } catch(e) {}
    }

    function renderSlots() {
        const team = document.getElementById('team'); team.innerHTML = "";
        for(let i=1; i<=6; i++) {
            team.innerHTML += `
            <div class="pkmn-card">
                <span id="p${i}-shiny-btn" class="shiny-toggle" onclick="toggleShiny(${i})">✨</span>
                <input type="hidden" id="p${i}-is-shiny" value="false" class="save">
                
                <div class="pkmn-header">
                    <div class="sprite-frame">
                        <img id="img-${i}" class="pkmn-img" style="display:none">
                        <div id="gim-badge-${i}" class="gimmick-badge"></div>
                    </div>
                    <div class="search-area">
                        <label>Pokémon #${i}</label>
                        <input type="text" id="p${i}-name" class="save" oninput="doSearch(${i})" placeholder="Espécie...">
                        <div id="drop-${i}" class="results-box"></div>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <div class="input-group"><label>Apelido</label><input type="text" id="p${i}-nick" class="save" placeholder="Apelido..."></div>
                    <div class="input-group"><label>Habilidade</label><select id="p${i}-ability" class="save"><option value="">Habilidade</option></select></div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <div class="input-group"><label>Item</label><input type="text" id="p${i}-item" class="save" placeholder="Item segurando..."></div>
                    <div class="input-group">
                        <label>Gimmick</label>
                        <select id="p${i}-gim" class="save" onchange="updateGimmickIcon(${i})">
                            <option value="">Nenhuma</option>
                            <option value="Mega">Mega</option>
                            <option value="Z-Move">Z-Move</option>
                            <option value="Dynamax">Dynamax</option>
                            <option value="Tera">Tera</option>
                        </select>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 60px; gap:8px">
                    <select id="p${i}-nature" class="save" onchange="calcStats(${i})"><option value="">Nature</option>${Object.keys(natures).map(n=>`<option value="${n}">${n}</option>`).join('')}</select>
                    <input type="number" id="p${i}-lvl" class="save" value="1" min="1" max="100" onchange="calcStats(${i}); updateMoves(${i});">
                </div>
                
                <div class="stats-container">
                    <div class="points-badge">Pontos Disponíveis: <span id="p${i}-pts">0</span></div>
                    ${['hp', 'atk', 'def', 'spa', 'spd', 'spe'].map(s => `
                        <div class="stat-row">
                            <span class="stat-label">${s.toUpperCase()}</span>
                            <input type="number" id="p${i}-base-${s}" class="save" placeholder="Base" onchange="calcStats(${i})">
                            <input type="number" id="p${i}-up-${s}" class="save" placeholder="Add" onchange="calcStats(${i})">
                            <span id="p${i}-total-${s}" class="stat-val">0</span>
                        </div>
                    `).join('')}
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px">
                    <select id="p${i}-m1" class="save"></select><select id="p${i}-m2" class="save"></select>
                    <select id="p${i}-m3" class="save"></select><select id="p${i}-m4" class="save"></select>
                </div>
            </div>`;
        }
    }

    function toggleShiny(slot) {
        const hiddenInput = document.getElementById(`p${slot}-is-shiny`);
        const btn = document.getElementById(`p${slot}-shiny-btn`);
        const isShiny = hiddenInput.value === 'true';
        
        hiddenInput.value = !isShiny;
        btn.classList.toggle('active', !isShiny);
        
        // Atualizar imagem se houver pokemon carregado
        if (pkmnFullData[slot]) {
            const img = document.getElementById(`img-${slot}`);
            const data = pkmnFullData[slot];
            if (!isShiny) {
                img.src = data.sprites.other['official-artwork'].front_shiny || data.sprites.front_shiny;
            } else {
                img.src = data.sprites.other['official-artwork'].front_default || data.sprites.front_default;
            }
        }
    }

    function calcStats(slot) {
        const lvl = parseInt(document.getElementById(`p${slot}-lvl`).value) || 1;
        const natureVal = document.getElementById(`p${slot}-nature`).value;
        const nature = natures[natureVal] || {plus: null, minus: null};
        
        const totalPoints = (lvl - 1) * 5;
        let usedPoints = 0;
        const stats = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
        
        stats.forEach(s => {
            const base = parseInt(document.getElementById(`p${slot}-base-${s}`).value) || 0;
            const up = parseInt(document.getElementById(`p${slot}-up-${s}`).value) || 0;
            usedPoints += up;

            let multiplier = 1.0;
            if(nature.plus === s) multiplier += 0.10;
            if(nature.minus === s) multiplier -= 0.10;

            const bonusExtra = Math.floor(up / 10) * 0.01;
            multiplier += bonusExtra;

            const total = Math.floor((base + up) * multiplier);
            const display = document.getElementById(`p${slot}-total-${s}`);
            display.innerText = total;
            display.style.color = multiplier > 1 ? '#10b981' : (multiplier < 1 ? '#ff3e3e' : '#f1f5f9');
        });

        const ptsSpan = document.getElementById(`p${slot}-pts`);
        ptsSpan.innerText = totalPoints - usedPoints;
        ptsSpan.style.color = (totalPoints - usedPoints) < 0 ? '#ff3e3e' : '#10b981';
    }

    function updateGimmickIcon(slot) {
        const val = document.getElementById(`p${slot}-gim`).value;
        const badge = document.getElementById(`gim-badge-${slot}`);
        if(val && gimmicks[val]) {
            badge.style.backgroundImage = `url('${gimmicks[val]}')`;
            badge.style.display = 'block';
        } else {
            badge.style.backgroundImage = 'none';
            badge.style.display = 'none';
        }
    }

    function updateCities() {
        const r = document.getElementById('t-region').value;
        const s = document.getElementById('t-city');
        const cur = s.value;
        s.innerHTML = '<option value="">Cidade...</option>';
        if(worldData[r]) worldData[r].forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
        if(cur) s.value = cur;
    }

    function doSearch(slot) {
        const q = document.getElementById(`p${slot}-name`).value.toLowerCase().replace(/ /g, '-');
        const drop = document.getElementById(`drop-${slot}`); drop.innerHTML = "";
        if(q.length < 2) return drop.style.display="none";
        const hits = allPkmn.filter(p => p.name.includes(q)).slice(0, 10);
        if(hits.length) {
            drop.style.display="block";
            hits.forEach(p => {
                const d = document.createElement('div'); d.innerText = format(p.name);
                d.onclick = () => selectPkmn(slot, p.name);
                drop.appendChild(d);
            });
        }
    }

    async function selectPkmn(slot, name, restoreData = null) {
        document.getElementById(`p${slot}-name`).value = format(name);
        document.getElementById(`drop-${slot}`).style.display = "none";
        try {
            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
            const d = await r.json();
            pkmnFullData[slot] = d;
            
            const img = document.getElementById(`img-${slot}`);
            const isShiny = document.getElementById(`p${slot}-is-shiny`).value === 'true';
            
            if (isShiny) {
                img.src = d.sprites.other['official-artwork'].front_shiny || d.sprites.front_shiny;
            } else {
                img.src = d.sprites.other['official-artwork'].front_default || d.sprites.front_default;
            }
            img.style.display = "block";
            
            // Habilidades
            const abSelect = document.getElementById(`p${slot}-ability`);
            const curAb = abSelect.value;
            abSelect.innerHTML = '<option value="">Habilidade</option>';
            d.abilities.forEach(a => {
                abSelect.innerHTML += `<option value="${format(a.ability.name)}">${format(a.ability.name)}</option>`;
            });
            if (restoreData) abSelect.value = restoreData[`p${slot}-ability`]; else abSelect.value = curAb;

            if(!restoreData) {
                d.stats.forEach((s, idx) => {
                    const map = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
                    document.getElementById(`p${slot}-base-${map[idx]}`).value = s.base_stat;
                });
                calcStats(slot);
            }

            moveCache[slot] = d.moves;
            updateMoves(slot, restoreData);
        } catch(e) {}
    }

    function updateMoves(slot, restoreData = null) {
        const moves = moveCache[slot]; if(!moves) return;
        const lvl = parseInt(document.getElementById(`p${slot}-lvl`).value) || 1;
        const avail = moves.filter(m => m.version_group_details.some(vd => vd.move_learn_method.name === 'level-up' && vd.level_learned_at <= lvl)).map(m => m.move.name);
        const unique = [...new Set(avail)].map(format).sort();
        for(let i=1; i<=4; i++) {
            const s = document.getElementById(`p${slot}-m${i}`);
            const cur = s.value; s.innerHTML = '<option value="">Golpe</option>';
            unique.forEach(m => s.innerHTML += `<option value="${m}">${m}</option>`);
            if(restoreData) s.value = restoreData[`p${slot}-m${i}`]; else s.value = cur;
        }
    }

    function convertSheet() {
        const d = (id) => document.getElementById(id).value || "---";
        const bagLines = document.getElementById('t-bag').value.split('\n').filter(l => l.trim() !== "");
        let bagText = "";
        const linesToRender = Math.max(3, bagLines.length);
        for(let i=0; i < linesToRender; i++) { bagText += `╰┈➤ ${bagLines[i] || ""}\n`; }
        let pkmnText = "";
        for(let i=1; i<=6; i++) {
            const pName = document.getElementById(`p${i}-name`).value;
            const pNick = document.getElementById(`p${i}-nick`).value;
            const pLvl = document.getElementById(`p${i}-lvl`).value;
            const isShiny = document.getElementById(`p${i}-is-shiny`).value === 'true';
            
            if(pName) {
                let pStr = pNick ? `${pNick} (${pName})` : pName;
                if(isShiny) pStr += " ✨";
                pkmnText += `╰┈➤ ${pStr} (Lv. ${pLvl})\n`;
            } else {
                pkmnText += `╰┈➤ Vazio\n`;
            }
        }
        const template = `‎‧₊˚✧Ficha do Treinador✧˚₊‧‎\n- Nome: ${d('t-name')}\n- Sexo: ${d('t-sex')}\n- Idade: ${d('t-age')}\n- Altura: ${d('t-height')}\n- Dinheiro: ₽ ${d('t-money')}\n\n━━━━❰BOLSA❱━━━━\n${bagText}\n━━━━▣━━◤POKÉMONS◢━━▣━━━━━\n${pkmnText}`;
        const res = document.getElementById('convert-result');
        res.innerText = template; res.style.display = 'block';
        alert("Convertido!");
    }

    async function cloudAction(type) {
        const user = document.getElementById('user-id').value;
        const pass = document.getElementById('user-pass').value;
        if(!user || !pass) return alert("Preencha o acesso.");
        if(type === 'save') {
            const sheet = {}; document.querySelectorAll('.save').forEach(el => sheet[el.id] = el.value);
            const { error } = await _supabase.from('fichas').upsert({ username: user, password: pass, data: sheet, avatar: document.getElementById('main-avatar').src }, { onConflict: 'username' });
            if(error) alert(error.message); else alert("Sincronizado!");
        } else {
            const { data } = await _supabase.from('fichas').select('*').eq('username', user).single();
            if(data && data.password === pass) {
                Object.keys(data.data).forEach(id => { 
                    const el = document.getElementById(id); 
                    if(el) el.value = data.data[id];
                    // Sync shiny UI
                    if(id.includes('is-shiny')) {
                        const slot = id.split('-')[0].replace('p', '');
                        document.getElementById(`p${slot}-shiny-btn`).classList.toggle('active', data.data[id] === 'true');
                    }
                });
                if(data.avatar) { const img = document.getElementById('main-avatar'); img.src = data.avatar; img.style.display='block'; document.getElementById('placeholder').style.display='none'; }
                updateCities();
                document.getElementById('t-city').value = data.data['t-city'];
                for(let i=1; i<=6; i++) { 
                    if(data.data[`p${i}-name`]) selectPkmn(i, data.data[`p${i}-name`].toLowerCase().replace(/ /g, '-'), data.data);
                    updateGimmickIcon(i);
                    calcStats(i);
                }
                alert("Carregado!");
            } else alert("Acesso negado.");
        }
    }

    document.getElementById('file-input').onchange = (e) => {
        if(!e.target.files.length) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = document.getElementById('image-to-crop'); img.src = event.target.result;
            document.getElementById('crop-modal').style.display = 'flex';
            if(cropper) cropper.destroy();
            cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function finishCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
        const mainImg = document.getElementById('main-avatar');
        mainImg.src = canvas.toDataURL(); mainImg.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('crop-modal').style.display = 'none';
    }

    init();
</script>
</body>
